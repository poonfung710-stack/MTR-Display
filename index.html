<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵乘客資訊顯示系統 (PIDS)</title>

<style>
/* 模擬港鐵月台 LED 屏幕風格 */
@font-face {
    /* 這裡使用系統內建的無襯線字體，並透過 CSS 模擬點陣/LED 感 */
    font-family: 'MTR-LED';
    src: local('Arial Black'), local('Impact');
}

body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    color: #00FF33; /* 經典港鐵 LED 綠字 */
    font-family: "PingFang HK", "Helvetica Neue", Helvetica, Arial, sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    overflow: hidden;
    padding: 3vh 4vw;
}

/* 頂部資訊列：左邊真實時間，右邊車站名稱 */
.header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid #947A4D; /* 屯馬綫代表色線條 */
    padding-bottom: 2vh;
    margin-bottom: 2vh;
}

.real-time {
    font-size: 5vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; /* 讓時間數字對齊 */
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
}

.station-title {
    font-size: 5vh;
    font-weight: bold;
    color: #FFFFFF; /* 車站名用白色，突出重點 */
}

/* 轉向/路線區塊 */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around; /* 均分上下行空間 */
}

.direction-group {
    background: #050505;
    border: 2px solid #222;
    border-radius: 10px;
    padding: 2vh 3vw;
    margin-bottom: 2vh;
}

.direction-title {
    font-size: 4.5vh;
    font-weight: bold;
    color: #FFCC00; /* 目的地通常用耀眼的黃色 */
    margin-bottom: 1.5vh;
    border-left: 8px solid #947A4D;
    padding-left: 15px;
}

/* 列車班次表格 */
.train-table {
    width: 100%;
    border-collapse: collapse;
}

.train-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5vh 0;
    border-bottom: 1px dashed #222;
}

.train-row:last-child {
    border-bottom: none;
}

/* 班次序號 */
.seq {
    font-size: 3.5vh;
    color: #888888;
    width: 10%;
}

/* 目的地 */
.dest {
    font-size: 4vh;
    color: #FFFFFF;
    width: 45%;
}

/* 24小時制到達時間 */
.arrival-time {
    font-size: 5vh;
    font-weight: bold;
    font-family: monospace;
    color: #00FF33;
    text-shadow: 0 0 10px rgba(0, 255, 51, 0.8);
    text-align: right;
    width: 45%;
}

/* 特殊狀態：正在駛入 / 即將抵達 */
.status-flash {
    color: #FF3333; /* 警示紅或金黃 */
    text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
    animation: blink 1s infinite playback-state;
}

@keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}

/* 底部防錯/更新提示 */
.footer-bar {
    text-align: right;
    font-size: 2.2vh;
    color: #444;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍 Tin Shui Wai</div>
    </div>

    <div class="main-content">
        
        <div class="direction-group">
            <div class="direction-title">往 屯門 To Tuen Mun</div>
            <div id="down-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">屯門</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">屯門</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">屯門</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

        <div class="direction-group">
            <div class="direction-title">往 烏溪沙 To Wu Kai Sha</div>
            <div id="up-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">烏溪沙</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">烏溪沙</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">烏溪沙</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        System Active | Refreshing every 10s
    </div>

<script>
const line = "TML";
const station = "TIS";

// 1. 左上角實時時鐘 (24小時制，包含秒)
function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);
updateClock();

// 2. 格式化 API 回傳的時間數據
function formatMtrTime(trainObj) {
    if (!trainObj) return `<div class="train-row"><div class="seq">-</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>`;
    
    const ttnt = parseInt(trainObj.ttnt, 10);
    let timeDisplay = "";
    
    // 如果剩下 0 或 1 分鐘，模擬車站顯示「正在駛入」或「即將抵達」
    if (ttnt === 0) {
        timeDisplay = `<span class="status-flash">正在駛入 Arriving</span>`;
    } else if (ttnt === 1) {
        timeDisplay = `<span class="status-flash">即將抵達 Dept</span>`;
    } else {
        // 提取 API 中的 time 欄位 (格式通常為 "YYYY-MM-DD HH:MM:SS")
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); // 只截取 HH:MM
        } else {
            timeDisplay = "--:--";
        }
    }

    // 獲取目的地中英文
    const destName = trainObj.dest === "TUM" ? "屯門 Tuen Mun" : "烏溪沙 Wu Kai Sha";

    return {
        dest: destName,
        time: timeDisplay
    };
}

// 3. 渲染單一方向的下三班車
function renderDirection(dataArray, elementId, defaultDest) {
    const container = document.getElementById(elementId);
    container.innerHTML = ""; // 清空舊資料

    // 港鐵 API 最多提供 4 班車，我們只取前 3 班
    for (let i = 0; i < 3; i++) {
        if (dataArray && dataArray[i]) {
            const info = formatMtrTime(dataArray[i]);
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${info.dest}</div>
                    <div class="arrival-time">${info.time}</div>
                </div>
            `;
        } else {
            // 如果沒有更多班次（例如深夜尾班車過後）
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${i === 0 ? "班次已完結 Service Ended" : "--"}</div>
                    <div class="arrival-time">--:--</div>
                </div>
            `;
        }
    }
}

// 4. 主載入函式
async function loadSchedule() {
    try {
        const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${line}&sta=${station}`;
        const response = await fetch(url);
        const json = await response.json();
        const data = json.data[`${line}-${station}`];

        if (data) {
            renderDirection(data.DOWN, "down-list", "屯門 Tuen Mun");
            renderDirection(data.UP, "up-list", "烏溪沙 Wu Kai Sha");
        }
    } catch (e) {
        console.error("MTR API Error:", e);
    }
}

// 首次載入與定時更新（改為 10 秒更新一次，讓全螢幕看板更精確）
loadSchedule();
setInterval(loadSchedule, 10000);
</script>

</body>
</html>
