<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵乘客資訊顯示系統 (PIDS) - 天水圍站</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    color: #00FF33; /* 經典港鐵 LED 鮮綠字 */
    /* 融入地鐵宋體風格：優先調用系統宋體並加粗，配合字距拉開，重現月台印刷質感 */
    font-family: "LiSong Pro", "儷宋 Pro", "Apple LiSung", "PMingLiU", "新細明體", "PingFang HK", "Microsoft JhengHei", sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    overflow: hidden;
    padding: 3vh 4vw;
}

/* 頂部資訊列：優化排版，徹底解決字體底部 1/10 被切斷的問題 */
.header-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end; /* 改為底部對齊，讓字腳有支撐 */
    border-bottom: 4px solid #947A4D; /* 屯馬綫代表色線條 */
    padding-bottom: 2.5vh; /* 增加底部留白，防止線條切到字腳 */
    margin-bottom: 1vh;
    box-sizing: border-box;
}

.real-time {
    font-size: 5vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; /* 確保時間數字對齊不抖動 */
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; /* 增大行高，給予字體下方充足空間 */
}

.station-title {
    font-size: 5vh;
    font-weight: 700;
    color: #FFFFFF; /* 車站名用白色 */
    letter-spacing: 2px; /* 稍微拉開字距，更像真實燈箱 */
    line-height: 1.2; /* 增大行高，防止中文底部被切 */
}

/* 班次顯示主要區域 */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around; /* 均分上下行路線空間 */
    margin: 2vh 0;
}

.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 2vh 3vw;
}

.direction-title {
    font-size: 4vh;
    font-weight: bold;
    color: #FFCC00; /* 目的地路綫提示使用經典耀眼黃色 */
    margin-bottom: 1.5vh;
    border-left: 8px solid #947A4D;
    padding-left: 15px;
    letter-spacing: 1px;
}

/* 使用 Table 結構確保在 iPad 上完全對齊不抖動 */
.train-table {
    width: 100%;
    border-collapse: collapse;
}

.train-table tr {
    border-bottom: 1px dashed #222;
}

.train-table tr:last-child {
    border-bottom: none;
}

.train-table td {
    padding: 1.2vh 0;
    vertical-align: middle;
}

/* 班次序號 (1, 2, 3, 4) */
.seq {
    font-size: 3.5vh;
    color: #666666;
    width: 10%;
    font-family: monospace;
}

/* 目的地文字（宋體模擬效果） */
.dest {
    font-size: 4.2vh;
    color: #FFFFFF;
    font-weight: 600;
    width: 50%;
    letter-spacing: 2px;
}

/* 24小時制到達時間 */
.arrival-time {
    font-size: 4.5vh;
    font-weight: bold;
    font-family: monospace;
    color: #00FF33;
    text-shadow: 0 0 10px rgba(0, 255, 51, 0.8);
    text-align: right;
    width: 40%;
}

/* 特殊狀態：正在駛入 / 即將抵達 改為紅色閃爍 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
    animation: blink 1s infinite;
    font-weight: bold;
}

@keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}

/* 底部狀態列 */
.footer-bar {
    text-align: right;
    font-size: 2vh;
    color: #444;
    letter-spacing: 1px;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍</div>
    </div>

    <div class="main-content">
        
        <div class="direction-group">
            <div class="direction-title">往 屯門方向</div>
            <table class="train-table">
                <tbody id="tuen-mun-list">
                    <tr><td class="seq">1</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                    <tr><td class="seq">2</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                    <tr><td class="seq">3</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                    <tr><td class="seq">4</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                </tbody>
            </table>
        </div>

        <div class="direction-group">
            <div class="direction-title">往 烏溪沙方向</div>
            <table class="train-table">
                <tbody id="wu-kai-sha-list">
                    <tr><td class="seq">1</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                    <tr><td class="seq">2</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                    <tr><td class="seq">3</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                    <tr><td class="seq">4</td><td class="dest">--</td><td class="arrival-time">--:--</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <div class="footer-bar">
        旅客資訊顯示系統 | 地鐵宋體模擬核心 | 自動更新: 10秒
    </div>

<script>
const line = "TML";
const station = "TIS";

// 屯馬綫所有車站的英中對照表（確保 100% 轉換為繁體中文）
const stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

// 1. 左上角 24 小時制真實時間 (包含秒)
function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);
updateClock(); // 初始化時鐘

// 2. 格式化 API 回傳的時間數據
function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    
    const ttnt = parseInt(trainObj.ttnt, 10);
    let timeDisplay = "";
    
    // 如果剩下 0 或 1 分鐘，顯示「正在駛入」或「即將抵達」的紅字閃爍效果
    if (ttnt === 0) {
        timeDisplay = `<span class="status-flash">正在駛入</span>`;
    } else if (ttnt === 1) {
        timeDisplay = `<span class="status-flash">即將抵達</span>`;
    } else {
        // 從 API 傳回的 "YYYY-MM-DD HH:MM:SS" 之中，截取 24小時制的 "HH:MM"
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
        } else {
            timeDisplay = "--:--";
        }
    }

    const rawDest = trainObj.dest;
    const destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;

    return {
        dest: destName,
        time: timeDisplay
    };
}

// 3. 渲染單向的下四班列車
function renderDirection(dataArray, elementId) {
    const container = document.getElementById(elementId);
    container.innerHTML = ""; // 先清空舊內容

    // 固定取 4 班車
    for (let i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            const info = formatMtrTime(dataArray[i]);
            container.innerHTML += `
                <tr>
                    <td class="seq">${i + 1}</td>
                    <td class="dest">${info.dest}</td>
                    <td class="arrival-time">${info.time}</td>
                </tr>
            `;
        } else {
            // 如果深夜尾班車過後沒有後續班次
            container.innerHTML += `
                <tr>
                    <td class="seq">${i + 1}</td>
                    <td class="dest">${i === 0 ? "班次已完結" : "--"}</td>
                    <td class="arrival-time">--:--</td>
                </tr>
            `;
        }
    }
}

// 4. 主載入函式
async function loadSchedule() {
    try {
        const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${line}&sta=${station}`;
        const response = await fetch(url);
        const json = await response.json();
        const data = json.data[`${line}-${station}`];

        if (data) {
            // 港鐵 API 規定：屯馬綫 UP 是往屯門方向，DOWN 是往烏溪沙方向
            renderDirection(data.UP, "tuen-mun-list");       
            renderDirection(data.DOWN, "wu-kai-sha-list");   
        }
    } catch (e) {
        console.error("MTR API Error:", e);
    }
}

// 首次加載班次
loadSchedule();

// 每 10 秒自動更新一次下班車資訊
setInterval(loadSchedule, 10000);
</script>

</body>
</html>
