<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合資訊顯示系統 (PIDS)</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 1.5vh 2vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #444444; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要分欄區域 */
.main-content {
    height: 90.5vh; 
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    margin: 1.5vh 0 0 0; 
    box-sizing: border-box;
}

/* 左右對半分 */
.left-col, .right-col {
    width: 48%; 
    height: 100%;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
}

/* 左側港鐵面板間距 */
.mtr-panel {
    height: 49%;
    margin-bottom: 1.5vh;
}
.mtr-panel:last-child {
    margin-bottom: 0;
}

/* 【關鍵修正】右側高度重新分配：輕鐵 62%，巴士 36.5% */
.lrt-panel {
    height: 62%; 
    margin-bottom: 1.5vh; 
}

.bus-panel {
    height: 36.5%; 
    margin-bottom: 0;
}

/* 容器群組 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.2vh 2vw; 
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
}

.direction-title {
    font-size: 3.8vh; 
    font-weight: bold;
    margin-bottom: 0.6vh;
    padding-left: 15px;
    line-height: 1.2;
}
.title-mtr { color: #B29A6F; border-left: 8px solid #947A4D; }
.title-lrt { color: #FF9900; border-left: 8px solid #FF9900; }
.title-bus { color: #FF3366; border-left: 8px solid #FF3366; } 

/* 列表容器 */
.train-list-container {
    height: 88%; 
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}
.train-row:last-child {
    border-bottom: none;
}

.seq {
    font-size: 3vh;
    color: #666666;
    width: 8%;
}

/* 左側港鐵 */
.left-col .dest-mtr { font-size: 4.2vh; color: #FFFFFF; font-weight: bold; width: 35%; white-space: nowrap; overflow: hidden; }
.left-col .countdown-mtr { font-size: 3.8vh; font-weight: bold; font-family: monospace; color: #FFCC00; text-shadow: 0 0 12px rgba(255, 204, 0, 0.8); text-align: right; width: 25%; }
.left-col .time-mtr { font-size: 4.4vh; font-weight: bold; font-family: monospace; text-align: right; width: 32%; color: #00FF33; text-shadow: 0 0 12px rgba(0, 255, 51, 0.8); }

/* 右側輕鐵 */
.lrt-no { font-size: 3.2vh; font-weight: bold; color: #FF9900; width: 12%; }
.dest-lrt { font-size: 3.2vh; color: #FFFFFF; font-weight: bold; white-space: nowrap; overflow: hidden; width: 38%; }
.mins-lrt { font-size: 3.4vh; font-weight: bold; font-family: monospace; color: #FFCC00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.8); text-align: right; width: 26%; }
.time-lrt { font-size: 2.5vh; font-family: monospace; color: #888888; text-align: right; width: 16%; }

/* 巴士 */
.bus-route-no-medium { font-size: 3.2vh; font-weight: bold; color: #FF3366; width: 16%; white-space: nowrap; }
.bus-eta-wrapper-full { display: flex; flex-direction: row; justify-content: space-between; width: 76%; }
.bus-time-inline-block { width: 33.33%; display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; }
.bus-mins-inline { font-size: 2.9vh; font-weight: bold; font-family: monospace; color: #FF99CC; text-shadow: 0 0 8px rgba(255, 51, 102, 0.8); white-space: nowrap; }
.bus-real-inline { font-size: 2.4vh; color: #888888; font-family: monospace; margin-left: 6px; white-space: nowrap; }
.bus-empty-msg-large { font-size: 3.2vh; color: #444444; }

.status-flash { color: #FF3333; animation: blink 1s infinite; }
@keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
</style>
</head>
<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天祐苑交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        <div class="left-col">
            <div class="direction-group mtr-panel"><div class="direction-title title-mtr">屯馬綫 往屯門方向</div><div class="train-list-container" id="tuen-mun-list"></div></div>
            <div class="direction-group mtr-panel"><div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div><div class="train-list-container" id="wu-kai-sha-list"></div></div>
        </div>
        <div class="right-col">
            <div class="direction-group lrt-panel"><div class="direction-title title-lrt">輕鐵 天慈站</div><div class="train-list-container" id="lrt-flat-list"></div></div>
            <div class="direction-group bus-panel"><div class="direction-title title-bus">巴士 天祐苑站</div><div class="train-list-container" id="bus-flat-list"></div></div>
        </div>
    </div>

<script>
// [原有的 JavaScript 邏輯保持不變，可直接接在下方]
var mtrLine = "TML", mtrStation = "TIS";
var stationNameMap = {"TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路", "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚", "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡", "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德", "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟", "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑", "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"};
function padZero(n) { return n < 10 ? '0' + n : n; }
var cachedLrtData = [], cachedBusData = { "276A": [], "B1": [], "A37": [], "269D": [] }, cachedMtrData = { UP: [], DOWN: [] }; 
function updateClock() {
    var now = new Date();
    document.getElementById('clock').innerText = padZero(now.getHours()) + ':' + padZero(now.getMinutes()) + ':' + padZero(now.getSeconds());
    renderRealMtrPIDS(); renderRealLrtPIDS(); renderRealBusPIDS();
}
setInterval(updateClock, 1000); updateClock();
function formatIsoTo24H(iso) { if (!iso) return "--:--"; var d = new Date(iso); return isNaN(d.getTime()) ? "--:--" : padZero(d.getHours()) + ":" + padZero(d.getMinutes()); }
function renderMtrDirection(arr, id, now) {
    var c = document.getElementById(id);
    var html = "";
    for (var i = 0; i < 4; i++) {
        var train = arr[i];
        var dest = train ? (stationNameMap[train.dest] || train.dest) : (i == 0 ? "資料更新中..." : "--");
        var time = train ? (train.ttnt == 0 ? "正在駛入" : (train.ttnt == 1 ? "即將抵達" : train.time.substring(11, 16))) : "--:--";
        var count = train && train.ttnt > 1 ? Math.ceil((new Date(train.time.replace(/-/g, "/")).getTime() - now)/60000) + " 分鐘" : "--";
        html += '<div class="train-row" style="height:25%;"><div class="seq">'+(i+1)+'</div><div class="dest dest-mtr">'+dest+'</div><div class="countdown-mtr">'+count+'</div><div class="time-mtr">'+time+'</div></div>';
    }
    c.innerHTML = html;
}
function renderRealMtrPIDS() { var n = Date.now(); renderMtrDirection(cachedMtrData.UP, "tuen-mun-list", n); renderMtrDirection(cachedMtrData.DOWN, "wu-kai-sha-list", n); }
function renderRealLrtPIDS() {
    var c = document.getElementById('lrt-flat-list'), h = "";
    for (var i = 0; i < 8; i++) {
        var t = cachedLrtData[i];
        h += '<div class="train-row" style="height:12.5%;"><div class="seq">'+(i+1)+'</div><div class="lrt-no">'+(t?t.route:"--")+'</div><div class="dest dest-lrt">'+(t?"往"+t.dest:(i==0?"資料更新中...":"--"))+'</div><div class="mins-lrt">'+(t?t.eta+" 分鐘":"--")+'</div><div class="time-lrt">--:--</div></div>';
    }
    c.innerHTML = h;
}
function renderRealBusPIDS() {
    var c = document.getElementById('bus-flat-list'), h = "";
    var routes = ["276A", "B1", "A37", "269D"];
    for (var i = 0; i < 4; i++) {
        var r = routes[i], etas = cachedBusData[r];
        h += '<div class="train-row" style="height:25%;"><div class="seq">'+(i+1)+'</div><div class="bus-route-no-medium">'+r+'</div><div class="bus-eta-wrapper-full">';
        for (var b = 0; b < 3; b++) h += '<div class="bus-time-inline-block"><span class="bus-mins-inline">'+(etas[b]?Math.floor((new Date(etas[b].eta)-Date.now())/60000)+"分":"--")+'</span></div>';
        h += '</div></div>';
    }
    c.innerHTML = h;
}
// 簡單 API 載入佔位符，實際請沿用你原本的 load 函數
</script>
</body>
</html>
