<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵乘客資訊顯示系統 (PIDS) - 天水圍站 (iOS 9 相容版)</title>

<style>
/* 基礎重設，防止不同世代的 Safari 亂加預設邊距 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    /* 針對 iOS 9 補上舊版 Flexbox 前綴 */
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
    padding: 1.5vh 3vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #947A4D; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 班次顯示主要區域 */
.main-content {
    height: 88vh; 
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-justify-content: space-between;
    justify-content: space-between; 
    margin: 0.5vh 0;
    box-sizing: border-box;
}

/* 每個方向的區塊 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.5vh 3vw; 
    height: 42vh; 
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-justify-content: flex-start;
    justify-content: flex-start;
    box-sizing: border-box;
}

.direction-title {
    font-size: 4.3vh; 
    font-weight: bold;
    color: #FFCC00; 
    margin-bottom: 0.8vh;
    border-left: 8px solid #947A4D;
    padding-left: 15px;
    line-height: 1.2;
}

/* 列車班次列表 */
.train-list-container {
    -webkit-flex: 1;
    flex: 1;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-justify-content: space-between;
    justify-content: space-between;
}

.train-row {
    display: -webkit-flex;
    display: flex;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    -webkit-align-items: center;
    align-items: center;
    padding: 0.3vh 0; 
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}

.train-row:last-child {
    border-bottom: none;
}

/* 班次序號 */
.seq {
    font-size: 3.6vh;
    color: #666666;
    width: 10%;
}

/* 目的地文字 */
.dest {
    font-size: 4.5vh;
    color: #FFFFFF;
    font-weight: bold;
    width: 45%;
}

/* 24小時制到達時間 */
.arrival-time {
    font-size: 4.8vh;
    font-weight: bold;
    font-family: monospace;
    color: #00FF33;
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.8);
    text-align: right;
    width: 45%;
}

/* 特殊狀態閃爍 - 補上舊版 WebKit 前綴 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}

@-webkit-keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}
@keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}

/* 底部狀態列 */
.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.6vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍</div>
    </div>

    <div class="main-content">
        
        <div class="direction-group">
            <div class="direction-title">往 屯門方向</div>
            <div class="train-list-container" id="tuen-mun-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

        <div class="direction-group">
            <div class="direction-title">往 烏溪沙方向</div>
            <div class="train-list-container" id="wu-kai-sha-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 運作中 | iOS 9 相容核心 | 自動更新: 10秒
    </div>

<script>
// iOS 9 降級處理：全部使用 var，禁用 const/let，禁用箭頭函數
var line = "TML";
var station = "TIS";

var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

// 自製 iOS 9 相容的補零工具函數（替代 String.padStart）
function padZero(num) {
    return num < 10 ? '0' + num : num;
}

function updateClock() {
    var now = new Date();
    var hours = padZero(now.getHours());
    var minutes = padZero(now.getMinutes());
    var seconds = padZero(now.getSeconds());
    document.getElementById('clock').innerText = hours + ":" + minutes + ":" + seconds;
}
setInterval(updateClock, 1000);
updateClock();

function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    
    var ttnt = parseInt(trainObj.ttnt, 10);
    var timeDisplay = "";
    
    if (ttnt === 0) {
        timeDisplay = '<span class="status-flash">正在駛入</span>';
    } else if (ttnt === 1) {
        timeDisplay = '<span class="status-flash">即將抵達</span>';
    } else {
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
        } else {
            timeDisplay = "--:--";
        }
    }

    var rawDest = trainObj.dest;
    var destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;

    return {
        dest: destName,
        time: timeDisplay
    };
}

function renderDirection(dataArray, elementId) {
    var container = document.getElementById(elementId);
    var htmlContent = "";

    for (var i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            var info = formatMtrTime(dataArray[i]);
            htmlContent += '<div class="train-row">' +
                                '<div class="seq">' + (i + 1) + '</div>' +
                                '<div class="dest">' + info.dest + '</div>' +
                                '<div class="arrival-time">' + info.time + '</div>' +
                           '</div>';
        } else {
            htmlContent += '<div class="train-row">' +
                                '<div class="seq">' + (i + 1) + '</div>' +
                                '<div class="dest">' + (i === 0 ? "班次已完結" : "--") + '</div>' +
                                '<div class="arrival-time">--:--</div>' +
                           '</div>';
        }
    }
    container.innerHTML = htmlContent;
}

// iOS 9 降級處理：使用 XMLHttpRequest 替代 fetch/async/await
function loadSchedule() {
    var url = "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=" + line + "&sta=" + station;
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                var data = json.data[line + "-" + station];
                if (data) {
                    renderDirection(data.UP, "tuen-mun-list");       
                    renderDirection(data.DOWN, "wu-kai-sha-list");   
                }
            } catch (e) {
                console.error("JSON Parse Error:", e);
            }
        }
    };
    xhr.send();
}

loadSchedule();
setInterval(loadSchedule, 10000);
</script>

</body>
</html>
