<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵乘客資訊顯示系統 (PIDS) - 天水圍站</title>

<style>
/* 基礎重設，防止不同世代的 Safari 亂加預設邊距 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; /* 經典港鐵 LED 鮮綠字 */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 1.5vh 3vw; /* 稍微縮小外邊距，讓內容撐得更大 */
}

/* 頂部資訊列：微調高度，釋放空間給下方 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #947A4D; /* 屯馬綫代表色線條 */
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 班次顯示主要區域：鎖定總高度為 88vh，擴大可視面積 */
.main-content {
    height: 88vh; 
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* 均勻拉開上下兩個方向 */
    margin: 0.5vh 0;
    box-sizing: border-box;
}

/* 每個方向的區塊：高度從 38vh 放大至 42vh，佔屏比大幅增加 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.5vh 3vw; 
    height: 42vh; 
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    box-sizing: border-box;
}

.direction-title {
    font-size: 4.3vh; /* 標題放大 */
    font-weight: bold;
    color: #FFCC00; /* 目的地路綫提示使用經典耀眼黃色 */
    margin-bottom: 0.8vh;
    border-left: 8px solid #947A4D;
    padding-left: 15px;
    line-height: 1.2;
}

/* 列車班次列表：平分剩餘空間，確保第四班列車絕對看得到 */
.train-list-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.3vh 0; /* 微調內襯，騰出空間給大字體 */
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}

.train-row:last-child {
    border-bottom: none;
}

/* 班次序號 (1, 2, 3, 4)：字體放大 */
.seq {
    font-size: 3.6vh;
    color: #666666;
    width: 10%;
}

/* 目的地文字：字體放大，視覺感更強 */
.dest {
    font-size: 4.5vh;
    color: #FFFFFF;
    font-weight: bold;
    width: 45%;
}

/* 24小時制到達時間：大幅放大至 4.8vh，更粗更顯眼 */
.arrival-time {
    font-size: 4.8vh;
    font-weight: bold;
    font-family: monospace;
    color: #00FF33;
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.8);
    text-align: right;
    width: 45%;
}

/* 特殊狀態：正在駛入 / 即將抵達 改為紅色閃爍 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}

/* 底部狀態列：佔 3% 高度，讓位給上方 */
.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.6vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍</div>
    </div>

    <div class="main-content">
        
        <div class="direction-group">
            <div class="direction-title">往 屯門方向</div>
            <div class="train-list-container" id="tuen-mun-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

        <div class="direction-group">
            <div class="direction-title">往 烏溪沙方向</div>
            <div class="train-list-container" id="wu-kai-sha-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 運作中 | 強制繁體中文核心 | 自動更新: 10秒
    </div>

<script>
const line = "TML";
const station = "TIS";

const stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);
updateClock();

function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    
    const ttnt = parseInt(trainObj.ttnt, 10);
    let timeDisplay = "";
    
    if (ttnt === 0) {
        timeDisplay = `<span class="status-flash">正在駛入</span>`;
    } else if (ttnt === 1) {
        timeDisplay = `<span class="status-flash">即將抵達</span>`;
    } else {
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
        } else {
            timeDisplay = "--:--";
        }
    }

    const rawDest = trainObj.dest;
    const destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;

    return {
        dest: destName,
        time: timeDisplay
    };
}

function renderDirection(dataArray, elementId) {
    const container = document.getElementById(elementId);
    container.innerHTML = "";

    for (let i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            const info = formatMtrTime(dataArray[i]);
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${info.dest}</div>
                    <div class="arrival-time">${info.time}</div>
                </div>
            `;
        } else {
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${i === 0 ? "班次已完結" : "--"}</div>
                    <div class="arrival-time">--:--</div>
                </div>
            `;
        }
    }
}

async function loadSchedule() {
    try {
        const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${line}&sta=${station}`;
        const response = await fetch(url);
        const json = await response.json();
        const data = json.data[`${line}-${station}`];

        if (data) {
            renderDirection(data.UP, "tuen-mun-list");       
            renderDirection(data.DOWN, "wu-kai-sha-list");   
        }
    } catch (e) {
        console.error("MTR API Error:", e);
    }
}

loadSchedule();
setInterval(loadSchedule, 10000);
</script>

</body>
</html>
