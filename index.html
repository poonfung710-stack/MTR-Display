<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合資訊顯示系統 (PIDS)</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
    padding: 1.5vh 2vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #444444; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要分欄區域 */
.main-content {
    height: 90.5vh; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    margin: 1.5vh 0 0 0; 
    box-sizing: border-box;
}

/* 左右對半分 */
.left-col, .right-col {
    width: 48%; 
    height: 100%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
}

.mtr-panel {
    height: 48%;
    margin-bottom: 4%;
}
.mtr-panel:last-child {
    margin-bottom: 0;
}

.lrt-panel {
    height: 62%; 
    margin-bottom: 4%;
}

.bus-panel {
    height: 34%; 
    margin-bottom: 0;
}

/* 容器群組 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.2vh 2vw; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
}

.direction-title {
    font-size: 3.8vh; 
    font-weight: bold;
    margin-bottom: 0.6vh;
    padding-left: 15px;
    line-height: 1.2;
}
.title-mtr { color: #B29A6F; border-left: 8px solid #947A4D; }
.title-lrt { color: #FF9900; border-left: 8px solid #FF9900; }
.title-bus { color: #FF3366; border-left: 8px solid #FF3366; } 

/* 列表容器 */
.train-list-container {
    height: 88%; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}
.train-row:last-child {
    border-bottom: none;
}

.seq {
    font-size: 3vh;
    color: #666666;
    width: 8%;
}

/* 左側港鐵字體與欄位佈局 */
.left-col .dest-mtr { 
    font-size: 4.2vh; 
    color: #FFFFFF; 
    font-weight: bold; 
    width: 30%; 
    white-space: nowrap; 
    overflow: hidden; 
}
.left-col .countdown-mtr { 
    font-size: 3.8vh; 
    font-weight: bold; 
    font-family: monospace; 
    color: #FFCC00; 
    text-shadow: 0 0 12px rgba(255, 204, 0, 0.8); 
    text-align: right; 
    width: 27%; 
}
.left-col .time-mtr { 
    font-size: 4.4vh; 
    font-weight: bold; 
    font-family: monospace; 
    text-align: right; 
    width: 35%; 
    color: #00FF33; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.8); 
}

/* 右側輕鐵優化：獨立欄位排版 */
.lrt-no { font-size: 3.2vh; font-weight: bold; color: #FF9900; width: 12%; }
.dest-lrt { font-size: 3.2vh; color: #FFFFFF; font-weight: bold; white-space: nowrap; overflow: hidden; width: 28%; }
.mins-lrt { 
    font-size: 3.4vh; 
    font-weight: bold; 
    font-family: monospace; 
    color: #FFCC00; 
    text-shadow: 0 0 10px rgba(255, 204, 0, 0.8); 
    text-align: right; 
    width: 24%; 
}
.time-lrt { 
    font-size: 3.6vh; /* 稍微放大一點 */
    font-weight: bold; 
    font-family: monospace; 
    color: #00FF33; /* 維持原本顏色 */
    text-shadow: 0 0 10px rgba(0, 255, 51, 0.8); 
    text-align: right; 
    width: 28%; 
}

/* 巴士優化：橫向一體化排版樣式 */
.bus-route-no-medium {
    font-size: 3.2vh; 
    font-weight: bold;
    color: #FF3366;
    width: 16%;
    white-space: nowrap;
}
.bus-eta-wrapper-full {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    width: 76%;
}
.bus-time-inline-block {
    width: 33.33%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    align-items: center; 
    justify-content: flex-end;
    box-sizing: border-box;
    padding-right: 4px;
}
.bus-mins-inline {
    font-size: 2.9vh; 
    font-weight: bold;
    font-family: monospace;
    color: #FF99CC;
    text-shadow: 0 0 8px rgba(255, 51, 102, 0.8);
    white-space: nowrap;
}
.bus-real-inline {
    font-size: 2.4vh; 
    color: #888888; 
    font-weight: normal;
    font-family: monospace;
    margin-left: 6px;
    white-space: nowrap;
}
.bus-empty-msg-large {
    font-size: 3.2vh;
    color: #444444;
}

/* 紅色閃爍狀態 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}

@-webkit-keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
@keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>

    <div class="main-content">
        
        <div class="left-col">

<script>
var mtrLine = "TML";
var mtrStation = "TIS";

var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function padZero(num) {
    return num < 10 ? '0' + num : num;
}

// 全局數據快取
var cachedLrtData = [];
var cachedBusData = {
    "276A": [],
    "B1": [],
    "A37": []
};

// 每 1 秒驅動時鐘、輕鐵與巴士面板的 10秒過期自動消失渲染
function updateClock() {
    var clockEl = document.getElementById('clock');
    if (!clockEl) return;
    var now = new Date();
    var hours = padZero(now.getHours());
    var minutes = padZero(now.getMinutes());
    var seconds = padZero(now.getSeconds());
    clockEl.innerText = hours + ':' + minutes + ':' + seconds;
    
    renderRealLrtPIDS();
    renderRealBusPIDS();
}
setInterval(updateClock, 1000);
updateClock();

function getTargetTime24H(addMinutes) {
    var now = new Date();
    now.setMinutes(now.getMinutes() + addMinutes);
    return padZero(now.getHours()) + ":" + padZero(now.getMinutes());
}

function formatIsoTo24H(isoString) {
    if (!isoString) return "--:--";
    var date = new Date(isoString);
    if (isNaN(date.getTime())) return "--:--";
    return padZero(date.getHours()) + ":" + padZero(date.getMinutes());
}

// ==========================================
// 右邊上方：輕鐵 天慈站 (拆分獨立雙欄位 + 10秒過期清除)
// ==========================================
function renderRealLrtPIDS() {
    var listContainer = document.getElementById('lrt-flat-list');
    if (!listContainer) return;
    
    var nowTime = Date.now();
    var validTrains = [];
    
    if (cachedLrtData && cachedLrtData.length > 0) {
        for (var k = 0; k < cachedLrtData.length; k++) {
            var train = cachedLrtData[k];
            var expireTime = nowTime + 999999; 
            if (train.absTimestamp) {
                expireTime = train.absTimestamp;
            } else if (train.eta !== 999) {
                expireTime = nowTime + (train.eta * 60000);
            }
            
            // 到達/預定時間過後 10秒 內清除
            if (nowTime >= (expireTime + 10000)) {
                continue; 
            }
            validTrains.push(train);
        }
    }

    var htmlString = '';
    var maxRows = 8; 

    for (var i = 0; i < maxRows; i++) {
        if (i < validTrains.length) {
            var train = validTrains[i];
            var etaDisplay = '';
            var realTime24H = '';

            if (train.eta === 0) {
                realTime24H = getTargetTime24H(0);
                if (train.rawTime && (train.rawTime.indexOf('離開') !== -1 || train.rawTime.toLowerCase().indexOf('departing') !== -1)) {
                    etaDisplay = '<span class="status-flash">離開中</span>';
                } else {
                    etaDisplay = '<span class="status-flash">到達</span>';
                }
            } else if (train.eta === 999) {
                etaDisplay = train.rawTime || '--';
                realTime24H = '--:--';
            } else {
                etaDisplay = train.eta + ' 分鐘';
                realTime24H = getTargetTime24H(train.eta);
            }

            var finalDest = "";
            if (train.route === '705') {
                finalDest = "往天水圍(北)";
            } else if (train.route === '706') {
                finalDest = "往天水圍(南)";
            } else if (train.dest && train.dest !== '--') {
                finalDest = "往" + train.dest;
            } else {
                finalDest = "--";
            }

            // 拆分為獨立的 .mins-lrt 與 .time-lrt 欄位，且取消括號
            htmlString += '<div class="train-row" style="height:12.5%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="lrt-no">' + train.route + '</div>' +
                '<div class="dest dest-lrt">' + finalDest + '</div>' +
                '<div class="mins-lrt">' + etaDisplay + '</div>' +
                '<div class="time-lrt">' + realTime24H + '</div>' +
                '</div>';
        } else {
            var defaultMsg = (i === 0 && validTrains.length === 0) ? "資料更新中..." : "--";
            htmlString += '<div class="train-row" style="height:12.5%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="lrt-no">--</div>' +
                '<div class="dest dest-lrt">' + defaultMsg + '</div>' +
                '<div class="mins-lrt">--</div>' +
                '<div class="time-lrt">--:--</div>' +
                '</div>';
        }
    }
    listContainer.innerHTML = htmlString;
}

function loadLrtSchedule() {
    var url = 'https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=435&with_special=1';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                var combinedTrains = [];
                var nowTime = Date.now();
                
                if (json && json.platform_list && Array.isArray(json.platform_list)) {
                    for (var p = 0; p < json.platform_list.length; p++) {
                        var platform = json.platform_list[p];
                        if (platform.route_list && Array.isArray(platform.route_list)) {
                            for (var r = 0; r < platform.route_list.length; r++) {
                                var route = platform.route_list[r];
                                var timeStrEn = route.time_en || "";
                                var etaMin = 999;
                                var timeLower = timeStrEn.toLowerCase();
                                
                                if (timeLower.indexOf('arriving') !== -1 || timeLower.indexOf('departing') !== -1 || timeStrEn === '-') {
                                    etaMin = 0;
                                } else {
                                    var pTime = parseInt(timeStrEn, 10);
                                    if (!isNaN(pTime)) {
                                        etaMin = pTime;
                                    }
                                }
                                
                                combinedTrains.push({
                                    route: route.route_no || '--',
                                    dest: route.dest_ch || '--',
                                    eta: etaMin,
                                    rawTime: route.time_ch || route.time_en,
                                    absTimestamp: nowTime + (etaMin * 60000)
                                });
                            }
                        }
                    }
                }
                combinedTrains.sort(function(a, b) { return a.eta - b.eta; });
                cachedLrtData = combinedTrains;
                renderRealLrtPIDS();
            } catch (e) {
                console.error("輕鐵 API 解析錯誤:", e);
            }
        }
    };
    xhr.send();
}

loadLrtSchedule();
setInterval(loadLrtSchedule, 10000);

// ==========================================
// 右邊下方：巴士三路線
// ==========================================
function generateBusRowHtml(seqNumber, routeName, rawEtas, nowTime) {
    var validEtas = [];
    if (rawEtas && rawEtas.length > 0) {
        for (var k = 0; k < rawEtas.length; k++) {
            var itemTime = new Date(rawEtas[k].eta).getTime();
            if (nowTime >= (itemTime + 10000)) {
                continue; 
            }
            validEtas.push(rawEtas[k]);
        }
    }

    var html = '<div class="train-row" style="height:33.3%;">';
    html += '<div class="seq">' + seqNumber + '</div>';
    html += '<div class="bus-route-no-medium">' + routeName + '</div>';
    html += '<div class="bus-eta-wrapper-full">';
    
    if (validEtas.length === 0) {
        html += '<div class="bus-empty-msg-large" style="width:100%; text-align:right;">資料更新中...</div>';
    } else {
        for (var b = 0; b < 3; b++) {
            if (b < validEtas.length) {
                var busItem = validEtas[b];
                var etaDate = new Date(busItem.eta);
                var diffMs = etaDate.getTime() - nowTime;
                var diffMins = Math.floor(diffMs / 60000);
                
                var minsText = diffMins <= 0 ? '<span class="status-flash">到達</span>' : diffMins + '分';
                var timeText = formatIsoTo24H(busItem.eta);
                
                html += '<div class="bus-time-inline-block">';
                html += '  <span class="bus-mins-inline">' + minsText + '</span>';
                html += '  <span class="bus-real-inline">' + timeText + '</span>';
                html += '</div>';
            } else {
                html += '<div class="bus-time-inline-block">';
                html += '  <span class="bus-mins-inline">--</span>';
                html += '  <span class="bus-real-inline">--:--</span>';
                html += '</div>';
            }
        }
    }
    html += '</div></div>';
    return html;
}

function renderRealBusPIDS() {
    var listContainer = document.getElementById('bus-flat-list');
    if (!listContainer) return;
    
    var nowTime = Date.now();
    var htmlString = '';
    
    htmlString += generateBusRowHtml(1, "276A", cachedBusData["276A"], nowTime);
    htmlString += generateBusRowHtml(2, "B1", cachedBusData["B1"], nowTime);
    htmlString += generateBusRowHtml(3, "A37", cachedBusData["A37"], nowTime);

    listContainer.innerHTML = htmlString;
}

function loadAllBusSchedules() {
    // 1. 276A API
    var url276A = 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/276A/1';
    var xhr276A = new XMLHttpRequest();
    xhr276A.open('GET', url276A, true);
    xhr276A.onreadystatechange = function() {
        if (xhr276A.readyState === 4 && xhr276A.status === 200) {
            try {
                var json = JSON.parse(xhr276A.responseText);
                if (json && json.data) {
                    var etas = [];
                    for (var i = 0; i < json.data.length; i++) {
                        var item = json.data[i];
                        var isCancelled = item.rmk_tc && item.rmk_tc.indexOf('取消') !== -1;
                        if (item.dir === "O" && item.seq == 9 && item.eta && !isCancelled) {
                            etas.push(item);
                        }
                    }
                    etas.sort(function(a, b) { return new Date(a.eta) - new Date(b.eta); });
                    cachedBusData["276A"] = etas;
                }
            } catch (e) {
                console.error("276A API 解析錯誤:", e);
            }
        }
    };
    xhr276A.send();

    // 2. B1 API
    loadB1PerfectSchedule();

    // 3. A37 API (聚星樓第 14 站)
    var urlA37 = 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/A37/1';
    var xhrA37 = new XMLHttpRequest();
    xhrA37.open('GET', urlA37, true);
    xhrA37.onreadystatechange = function() {
        if (xhrA37.readyState === 4 && xhrA37.status === 200) {
            try {
                var json = JSON.parse(xhrA37.responseText);
                if (json && json.data) {
                    var filteredA37 = [];
                    var targetStopId = "";
                    
                    for (var i = 0; i < json.data.length; i++) {
                        var item = json.data[i];
                        if (item.dir === "O" && item.seq == 14) {
                            targetStopId = item.stop; 
                            break;
                        }
                    }

                    for (var i = 0; i < json.data.length; i++) {
                        var item = json.data[i];
                        var isCancelled = item.rmk_tc && item.rmk_tc.indexOf('取消') !== -1;
                        
                        if (item.eta && !isCancelled) {
                            if (targetStopId) {
                                if (item.stop === targetStopId) {
                                    filteredA37.push(item);
                                }
                            } else {
                                if (item.dir === "O" && item.seq == 14) {
                                    filteredA37.push(item);
                                }
                            }
                        }
                    }

                    filteredA37.sort(function(a, b) { return new Date(a.eta) - new Date(b.eta); });
                    
                    var finalA37 = [];
                    var seenTimes = {};
                    for (var j = 0; j < filteredA37.length; j++) {
                        var aItem = filteredA37[j];
                        var timeString = formatIsoTo24H(aItem.eta);
                        if (!seenTimes[timeString]) {
                            seenTimes[timeString] = true;
                            finalA37.push(aItem);
                        }
                    }
                    cachedBusData["A37"] = finalA37.slice(0, 3);
                }
            } catch (e) {
                console.error("A37 API 解析錯誤:", e);
            }
        }
    };
    xhrA37.send();
}

function loadB1PerfectSchedule() {
    var urlB1 = 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/B1/1';
    var xhrB1 = new XMLHttpRequest();
    xhrB1.open('GET', urlB1, true);
    xhrB1.onreadystatechange = function() {
        if (xhrB1.readyState === 4 && xhrB1.status === 200) {
            try {
                var json = JSON.parse(xhrB1.responseText);
                if (json && json.data) {
                    var filteredB1 = [];
                    var targetStopId = "";
                    
                    for (var i = 0; i < json.data.length; i++) {
                        var item = json.data[i];
                        if (item.dir === "O" && item.seq == 4) {
                            targetStopId = item.stop; 
                            break;
                        }
                    }

                    for (var i = 0; i < json.data.length; i++) {
                        var item = json.data[i];
                        var isCancelled = item.rmk_tc && item.rmk_tc.indexOf('取消') !== -1;
                        
                        if (item.eta && !isCancelled) {
                            if (targetStopId) {
                                if (item.stop === targetStopId) {
                                    filteredB1.push(item);
                                }
                            } else {
                                if (item.dir === "O" && item.seq == 4) {
                                    filteredB1.push(item);
                                }
                            }
                        }
                    }

                    filteredB1.sort(function(a, b) { return new Date(a.eta) - new Date(b.eta); });
                    
                    var finalB1 = [];
                    var seenTimes = {};
                    for (var j = 0; j < filteredB1.length; j++) {
                        var bItem = filteredB1[j];
                        var timeString = formatIsoTo24H(bItem.eta);
                        if (!seenTimes[timeString]) {
                            seenTimes[timeString] = true;
                            finalB1.push(bItem);
                        }
                    }
                    cachedBusData["B1"] = finalB1.slice(0, 3);
                }
            } catch (e) {
                console.error("B1 API 解析錯誤:", e);
            }
        }
    };
    xhrB1.send();
}

loadAllBusSchedules();
setInterval(loadAllBusSchedules, 10000);

// ==========================================
// 左邊：港鐵屯馬綫資料核心
// ==========================================
function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    var ttnt = parseInt(trainObj.ttnt, 10);
    var timeDisplay = "";
    var countdownText = ""; 

    if (ttnt === 0) {
        timeDisplay = '<span class="status-flash">正在駛入</span>';
        countdownText = ""; 
    } else if (ttnt === 1) {
        timeDisplay = '<span class="status-flash">即將抵達</span>';
        countdownText = ""; 
    } else {
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
            var trainTime = new Date(trainObj.time.replace(/-/g, "/")); 
            var now = new Date();
            var diffMs = trainTime.getTime() - now.getTime();
            var diffMins = Math.ceil(diffMs / 60000); 

            if (diffMins > 0) {
                countdownText = diffMins + ' 分鐘';
            } else {
                countdownText = '--';
            }
        } else {
            timeDisplay = "--:--";
            countdownText = "--";
        }
    }
    
    var rawDest = trainObj.dest;
    var destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;
    return { dest: destName, time: timeDisplay, countdown: countdownText };
}

function renderMtrDirection(dataArray, elementId) {
    var container = document.getElementById(elementId);
    if (!container) return;
    
    var htmlString = "";
    for (var i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            var info = formatMtrTime(dataArray[i]);
            htmlString += '<div class="train-row" style="height:25%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + info.dest + '</div>' +
                '<div class="countdown-mtr">' + info.countdown + '</div>' +
                '<div class="arrival-time time-mtr">' + info.time + '</div>' +
                '</div>';
        } else {
            var defaultMsg = (i === 0 && (!dataArray || dataArray.length === 0)) ? "資料更新中..." : "--";
            htmlString += '<div class="train-row" style="height:25%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + defaultMsg + '</div>' +
                '<div class="countdown-mtr">--</div>' +
                '<div class="arrival-time time-mtr">--:--</div>' +
                '</div>';
        }
    }
    container.innerHTML = htmlString;
}

function loadMtrSchedule() {
    var url = 'https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=' + mtrLine + '&sta=' + mtrStation;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var json = JSON.parse(xhr.responseText);
                    if (!json || !json.data) {
                        renderMtrDirection([], "tuen-mun-list");
                        renderMtrDirection([], "wu-kai-sha-list");
                        return;
                    }
                    var data = json.data[mtrLine + '-' + mtrStation];
                    if (data) {
                        renderMtrDirection(data.UP, "tuen-mun-list");       
                        renderMtrDirection(data.DOWN, "wu-kai-sha-list");   
                    } else {
                        renderMtrDirection([], "tuen-mun-list");
                        renderMtrDirection([], "wu-kai-sha-list");
                    }
                } catch (e) {
                    console.error("MTR API Parse Error", e);
                    renderMtrDirection([], "tuen-mun-list");
                    renderMtrDirection([], "wu-kai-sha-list");
                }
            } else {
                renderMtrDirection([], "tuen-mun-list");
                renderMtrDirection([], "wu-kai-sha-list");
            }
        }
    };
    xhr.send();
}

renderMtrDirection([], "tuen-mun-list");
renderMtrDirection([], "wu-kai-sha-list");
loadMtrSchedule();
setInterval(loadMtrSchedule, 10000);
