<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>輕鐵天慈站乘客資訊顯示系統 (PIDS)</title>

<style>
/* 基礎全螢幕重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #FF9900; /* 經典輕鐵橙金色 */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    box-sizing: border-box;
    padding: 2vh 3vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 10vh; 
    border-bottom: 5px solid #FF9900; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 1vh;
    font-size: 5.5vh;
    font-weight: bold;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(255, 153, 0, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 1vh;
    font-size: 5.5vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要看板區域 */
.main-content {
    height: 84vh; 
    margin: 1.5vh 0;
    background: #050505;
    border: 3px solid #111;
    border-radius: 16px;
    padding: 1.5vh 2.5vw;
    box-sizing: border-box;
}

/* 列表行排版 */
.train-row {
    width: 100%;
    height: 9vh; 
    line-height: 9vh;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}
.train-row::after {
    content: "";
    display: block;
    clear: both;
}
.train-row:last-child { 
    border-bottom: none; 
}

/* 各欄位尺寸與字體放大 */
.seq {
    font-size: 4vh;
    color: #555555;
    float: left;
    width: 8%;
}

.lrt-no {
    font-size: 5vh;
    color: #FF9900;
    font-weight: bold;
    float: left;
    width: 18%;
}

.dest {
    font-size: 4.8vh;
    color: #FFFFFF;
    font-weight: bold;
    float: left;
    width: 44%;
    white-space: nowrap;
    overflow: hidden;
}

.arrival-time {
    font-size: 4.8vh;
    font-weight: bold;
    font-family: monospace;
    color: #FFCC00;
    float: right;
    text-align: right;
    width: 30%;
    text-shadow: 0 0 8px rgba(255,204,0,0.8);
}

/* 閃爍動畫 */
.status-flash {
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}
@-webkit-keyframes blink {
    0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; }
}
@keyframes blink {
    0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; }
}

/* 頁尾 */
.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.8vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">輕鐵 天慈站 (Tin Tsz)</div>
    </div>

    <div class="main-content">
        <div id="lrt-flat-list">
            <div class="train-row"><div class="seq">1</div><div class="lrt-no">--</div><div class="dest">正在建立即時連線...</div><div class="arrival-time">-- 分鐘</div></div>
            <div class="train-row"><div class="seq">2</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time">-- 分鐘</div></div>
            <div class="train-row"><div class="seq">3</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time">-- 分鐘</div></div>
            <div class="train-row"><div class="seq">4</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time">-- 分鐘</div></div>
            <div class="train-row"><div class="seq">5</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time">-- 分鐘</div></div>
            <div class="train-row"><div class="seq">6</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time">-- 分鐘</div></div>
            <div class="train-row"><div class="seq">7</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time">-- 分鐘</div></div>
            <div class="train-row"><div class="seq">8</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time">-- 分鐘</div></div>
        </div>
    </div>

    <div class="footer-bar">
        純輕鐵看板模式 | 代理破防通道 | 自動刷新: 10秒
    </div>

<script>
var lrtStationId = "435"; // 天慈站 ID

// 電子時鐘
function padZero(num) {
    return num < 10 ? '0' + num : num;
}
function updateClock() {
    var now = new Date();
    document.getElementById('clock').innerText = padZero(now.getHours()) + ":" + padZero(now.getMinutes()) + ":" + padZero(now.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

// 核心輕鐵資料撈取與解構邏輯
function loadLrtSchedule() {
    var xhr = new XMLHttpRequest();
    var targetUrl = "https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule.php?id=" + lrtStationId;
    
    // 使用 allorigins 代理伺服器徹底解決舊裝置的 CORS 跨網域與 SSL 加密問題
    xhr.open("GET", "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl), true);
    
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var wrapperJson = JSON.parse(xhr.responseText);
                var json = JSON.parse(wrapperJson.contents);
                
                if (!json || !json.platform_list) return;
                
                var platforms = json.platform_list;
                var htmlContent = "";
                var displayCount = 0;
                
                // 為了防禦舊引擎，使用最保險的雙層基本 for 迴圈拆解月台與車次
                for (var p = 0; p < platforms.length; p++) {
                    if (displayCount >= 8) break;
                    
                    var pObj = platforms[p];
                    if (pObj && pObj.route_list) {
                        var routes = pObj.route_list;
                        
                        for (var r = 0; r < routes.length; r++) {
                            if (displayCount >= 8) break;
                            
                            var rObj = routes[r];
                            if (rObj && rObj.route_no) {
                                displayCount++;
                                
                                var rTime = rObj.time_ch || "-- 分鐘";
                                var displayTime = (rTime === "到達" || rTime === "即將抵達") ? 
                                    '<span class="status-flash" style="color:#FF3333">' + rTime + '</span>' : rTime;
                                
                                htmlContent += '<div class="train-row">' +
                                                    '<div class="seq">' + displayCount + '</div>' +
                                                    '<div class="lrt-no">' + rObj.route_no + '</div>' +
                                                    '<div class="dest">往 ' + (rObj.dest_ch || "") + '</div>' +
                                                    '<div class="arrival-time">' + displayTime + '</div>' +
                                               '</div>';
                            }
                        }
                    }
                }
                
                // 若班次不足 8 班則補上空白行維持版面美觀
                while (displayCount < 8) {
                    displayCount++;
                    htmlContent += '<div class="train-row">' +
                                        '<div class="seq">' + displayCount + '</div>' +
                                        '<div class="lrt-no">--</div>' +
                                        '<div class="dest">--</div>' +
                                        '<div class="arrival-time">-- 分鐘</div>' +
                                   '</div>';
                }
                
                document.getElementById("lrt-flat-list").innerHTML = htmlContent;
                
            } catch (e) {}
        }
    };
    xhr.send();
}

// 初始化並設定 10 秒自動同步一次
loadLrtSchedule();
setInterval(loadLrtSchedule, 10000); 
</script>

</body>
</html>
