<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合乘客資訊顯示系統 (PIDS) - 天水圍 (iOS 9 加固版)</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    box-sizing: border-box;
    padding: 1.5vh 2vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #947A4D; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要區域清除浮動排版 */
.main-content {
    height: 88vh; 
    margin: 1vh 0;
    box-sizing: border-box;
}
.main-content::after {
    content: "";
    display: block;
    clear: both;
}

/* 左右精準平分 50% */
.left-col {
    width: 50%;
    height: 100%;
    float: left;
    box-sizing: border-box;
    padding-right: 1vw;
}

.right-col {
    width: 50%;
    height: 100%;
    float: left;
    box-sizing: border-box;
    padding-left: 1vw;
}

/* 容器區塊 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.2vh 2vw; 
    box-sizing: border-box;
    margin-bottom: 1.5vh;
}

.mtr-group { height: 43vh; }
.right-group { height: 43vh; }

/* 標題樣式 */
.direction-title {
    font-weight: bold;
    margin-bottom: 0.6vh;
    padding-left: 12px;
    line-height: 1.2;
}
.title-mtr { font-size: 3.5vh; color: #FFCC00; border-left: 6px solid #947A4D; }
.title-lrt { font-size: 3.5vh; color: #FF9900; border-left: 6px solid #FF9900; }
.title-bus { font-size: 3.5vh; color: #FF3333; border-left: 6px solid #FF3333; }

/* 列表行排版 */
.train-row {
    width: 100%;
    height: 7.5vh; 
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
    line-height: 7.5vh;
}
.train-row::after {
    content: "";
    display: block;
    clear: both;
}
.train-row:last-child { border-bottom: none; }

.seq {
    font-size: 3.2vh;
    color: #666666;
    float: left;
    width: 10%;
}
.dest {
    font-size: 3.8vh;
    color: #FFFFFF;
    font-weight: bold;
    float: left;
    width: 50%;
    white-space: nowrap;
    overflow: hidden;
}

.arrival-time {
    font-weight: bold;
    font-family: monospace;
    float: right;
    text-align: right;
    width: 40%;
}
.time-mtr { font-size: 4.2vh; color: #00FF33; text-shadow: 0 0 10px rgba(0,255,51,0.8); }
.time-lrt { font-size: 3.8vh; color: #FF9900; text-shadow: 0 0 8px rgba(255,153,0,0.8); }
.time-bus { font-size: 3.8vh; color: #FF3333; text-shadow: 0 0 8px rgba(255,51,51,0.8); }

/* 閃爍動畫 */
.status-flash {
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}
@-webkit-keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}
@keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}

.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.6vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍交通顯示屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-group">
                <div class="direction-title title-mtr">往 屯門方向</div>
                <div id="tuen-mun-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>
            
            <div class="direction-group mtr-group">
                <div class="direction-title title-mtr">往 烏溪沙方向</div>
                <div id="wu-kai-sha-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group right-group">
                <div class="direction-title title-lrt">輕鐵 天慈站 (Next Train)</div>
                <div id="lrt-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest" style="color:#FF9900">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest" style="color:#FF9900">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest" style="color:#FF9900">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest" style="color:#FF9900">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                </div>
            </div>

            <div class="direction-group right-group">
                <div class="direction-title title-bus">九巴 276A (天祐苑) 往上水</div>
                <div id="bus-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest" style="color:#FF3333">276A 上水</div><div class="arrival-time time-bus">--:--</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest" style="color:#CCCCCC">下班車</div><div class="arrival-time time-bus">--:--</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest" style="color:#CCCCCC">第三班</div><div class="arrival-time time-bus">--:--</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest" style="color:#CCCCCC">第四班</div><div class="arrival-time time-bus">--:--</div></div>
                </div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 運作中 | iOS 9 安全解析加固版 | 自動更新: 10秒
    </div>

<script>
var mtrLine = "TML";
var mtrStation = "TIS";
var lrtStationId = "435"; 

var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function padZero(num) {
    return num < 10 ? '0' + num : num;
}

function updateClock() {
    var now = new Date();
    document.getElementById('clock').innerText = padZero(now.getHours()) + ":" + padZero(now.getMinutes()) + ":" + padZero(now.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

// 港鐵地鐵數據渲染
function renderMtrDirection(dataArray, elementId) {
    var container = document.getElementById(elementId);
    var htmlContent = "";
    for (var i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            var ttnt = parseInt(dataArray[i].ttnt, 10);
            var timeDisplay = "";
            if (ttnt === 0) {
                timeDisplay = '<span class="status-flash" style="color:#FF3333">正在駛入</span>';
            } else if (ttnt === 1) {
                timeDisplay = '<span class="status-flash" style="color:#FF3333">即將抵達</span>';
            } else {
                timeDisplay = dataArray[i].time ? dataArray[i].time.substring(11, 16) : "--:--";
            }
            var destName = stationNameMap[dataArray[i].dest] || dataArray[i].dest_tch || dataArray[i].dest;
            htmlContent += '<div class="train-row">' +
                                '<div class="seq">' + (i + 1) + '</div>' +
                                '<div class="dest">' + destName + '</div>' +
                                '<div class="arrival-time time-mtr">' + timeDisplay + '</div>' +
                           '</div>';
        } else {
            htmlContent += '<div class="train-row">' +
                                '<div class="seq">' + (i + 1) + '</div>' +
                                '<div class="dest">' + (i === 0 ? "班次已完結" : "--") + '</div>' +
                                '<div class="arrival-time time-mtr">--:--</div>' +
                           '</div>';
        }
    }
    container.innerHTML = htmlContent;
}

function loadMtrSchedule() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=" + mtrLine + "&sta=" + mtrStation, true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                var data = json.data[mtrLine + "-" + mtrStation];
                if (data) {
                    renderMtrDirection(data.UP, "tuen-mun-list");       
                    renderMtrDirection(data.DOWN, "wu-kai-sha-list");   
                }
            } catch (e) {}
        }
    };
    xhr.send();
}

// 輕鐵數據渲染（加入 iOS 9 嚴格防禦性程式碼）
function loadLrtSchedule() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule.php?id=" + lrtStationId, true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                var platformList = json.platform_list;
                var allItems = [];
                
                if (platformList && platformList.length) {
                    for (var p = 0; p < platformList.length; p++) {
                        var routeList = platformList[p].route_list;
                        if (routeList && routeList.length) {
                            for (var r = 0; r < routeList.length; r++) {
                                var rTime = routeList[r].time_ch;
                                var minutesNum = (rTime === "到達" || rTime === "即將抵達") ? 0 : parseInt(rTime, 10);
                                if (isNaN(minutesNum)) minutesNum = 99;
                                allItems.push({
                                    route: routeList[r].route_no || "--",
                                    dest: routeList[r].dest_ch || "--",
                                    timeStr: rTime || "--",
                                    timeValue: minutesNum
                                });
                            }
                        }
                    }
                }
                
                allItems.sort(function(a, b) { return a.timeValue - b.timeValue; });

                var htmlContent = "";
                for (var i = 0; i < 4; i++) {
                    if (allItems[i]) {
                        var displayTime = (allItems[i].timeStr === "到達" || allItems[i].timeStr === "即將抵達") ? 
                            '<span class="status-flash" style="color:#FF3333">' + allItems[i].timeStr + '</span>' : allItems[i].timeStr;
                        htmlContent += '<div class="train-row">' +
                                            '<div class="seq">' + (i + 1) + '</div>' +
                                            '<div class="dest" style="color:#FF9900">' + allItems[i].route + ' ' + allItems[i].dest + '</div>' +
                                            '<div class="arrival-time time-lrt">' + displayTime + '</div>' +
                                       '</div>';
                    } else {
                        htmlContent += '<div class="train-row">' +
                                            '<div class="seq">' + (i + 1) + '</div>' +
                                            '<div class="dest" style="color:#444">--</div>' +
                                            '<div class="arrival-time time-lrt">-- 分鐘</div>' +
                                       '</div>';
                    }
                }
                document.getElementById("lrt-list").innerHTML = htmlContent;
            } catch (e) {}
        }
    };
    xhr.send();
}

// 巴士數據渲染（核心修改：直接切割字串，絕不使用 new Date() 避免 iOS 9 NaN 崩潰）
function loadBusSchedule() {
    var xhr = new XMLHttpRequest();
    // 使用九巴官方 API：天祐苑站 (TI14-N-1050-0) 276A 往上水
    xhr.open("GET", "https://data.etabus.gov.hk/v1/transport/kmb/eta/TI14-N-1050-0/276A/1", true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                var data = json.data;
                var validEta = [];
                
                if (data && data.length) {
                    for (var d = 0; d < data.length; d++) {
                        if (data[d].eta) {
                            validEta.push(data[d]);
                        }
                    }
                }

                var htmlContent = "";
                for (var i = 0; i < 4; i++) {
                    var label = i === 0 ? "276A 上水" : i === 1 ? "下班車" : i === 2 ? "第三班" : "第四班";
                    var labelColor = i === 0 ? "#FF3333" : "#CCCCCC";
                    
                    if (validEta[i] && validEta[i].eta) {
                        // 強制不透過 Date 引擎，直接用物理字串切割 "2026-07-13T16:20:00+08:00" 的 11-16 位元
                        var rawEtaStr = validEta[i].eta;
                        var timeStr = "--:--";
                        if (rawEtaStr && rawEtaStr.length >= 16) {
                            timeStr = rawEtaStr.substring(11, 16);
                        }
                        htmlContent += '<div class="train-row">' +
                                            '<div class="seq">' + (i + 1) + '</div>' +
                                            '<div class="dest" style="color:' + labelColor + '">' + label + '</div>' +
                                            '<div class="arrival-time time-bus">' + timeStr + '</div>' +
                                       '</div>';
                    } else {
                        htmlContent += '<div class="train-row">' +
                                            '<div class="seq">' + (i + 1) + '</div>' +
                                            '<div class="dest" style="color:#444">' + label + '</div>' +
                                            '<div class="arrival-time time-bus">--:--</div>' +
                                       '</div>';
                    }
                }
                document.getElementById("bus-list").innerHTML = htmlContent;
            } catch (e) {}
        }
    };
    xhr.send();
}

function updateAllData() {
    loadMtrSchedule();
    loadLrtSchedule();
    loadBusSchedule();
}

updateAllData();
setInterval(updateAllData, 10000); 
</script>

</body>
</html>
