<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵綜合乘客資訊顯示系統 (PIDS) - 天水圍 (終極代理破防版)</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    box-sizing: border-box;
    padding: 1.5vh 2vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #947A4D; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要區域 */
.main-content {
    height: 88vh; 
    margin: 1vh 0;
    box-sizing: border-box;
}
.main-content::after {
    content: "";
    display: block;
    clear: both;
}

/* 左右精準平分 50% */
.left-col {
    width: 50%;
    height: 100%;
    float: left;
    box-sizing: border-box;
    padding-right: 1vw;
}

.right-col {
    width: 50%;
    height: 100%;
    float: left;
    box-sizing: border-box;
    padding-left: 1vw;
}

/* 容器區塊 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.2vh 2vw; 
    box-sizing: border-box;
    margin-bottom: 1.5vh;
}

.mtr-group { height: 43vh; }
.lrt-full-group { 
    height: 100%; 
    overflow-y: auto;
    overflow-x: hidden;
} 

/* 標題樣式 */
.direction-title {
    font-weight: bold;
    margin-bottom: 0.6vh;
    padding-left: 12px;
    line-height: 1.2;
}
.title-mtr { font-size: 3.5vh; color: #FFCC00; border-left: 6px solid #947A4D; }
.title-lrt { font-size: 3.5vh; color: #FF9900; border-left: 6px solid #FF9900; }

/* 列表行排版 */
.train-row {
    width: 100%;
    height: 7.5vh; 
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
    line-height: 7.5vh;
}
.train-row::after {
    content: "";
    display: block;
    clear: both;
}
.train-row:last-child { border-bottom: none; }

.lrt-row {
    height: 9.2vh;
    line-height: 9.2vh;
}

.seq {
    font-size: 3.2vh;
    color: #666666;
    float: left;
    width: 8%;
}

.lrt-no {
    font-size: 4vh;
    color: #FF9900;
    font-weight: bold;
    float: left;
    width: 15%;
}

.dest {
    font-size: 3.8vh;
    color: #FFFFFF;
    font-weight: bold;
    float: left;
    width: 47%;
    white-space: nowrap;
    overflow: hidden;
}

.arrival-time {
    font-weight: bold;
    font-family: monospace;
    float: right;
    text-align: right;
    width: 30%;
}
.time-mtr { font-size: 4.2vh; color: #00FF33; text-shadow: 0 0 10px rgba(0,255,51,0.8); }
.time-lrt { font-size: 4vh; color: #FFCC00; text-shadow: 0 0 8px rgba(255,204,0,0.8); }

/* 閃爍動畫 */
.status-flash {
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}
@-webkit-keyframes blink {
    0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; }
}
@keyframes blink {
    0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; }
}

.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.6vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-group">
                <div class="direction-title title-mtr">屯馬綫 往屯門方向</div>
                <div id="tuen-mun-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>
            
            <div class="direction-group mtr-group">
                <div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div>
                <div id="wu-kai-sha-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group lrt-full-group">
                <div class="direction-title title-lrt">輕鐵 天慈站 (下一班列車)</div>
                <div id="lrt-flat-list">
                    <div class="train-row lrt-row"><div class="seq">1</div><div class="lrt-no">載入中</div><div class="dest">嘗試連接輕鐵API</div><div class="arrival-time time-lrt">--</div></div>
                    <div class="train-row lrt-row"><div class="seq">2</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row lrt-row"><div class="seq">3</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row lrt-row"><div class="seq">4</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row lrt-row"><div class="seq">5</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row lrt-row"><div class="seq">6</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row lrt-row"><div class="seq">7</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                    <div class="train-row lrt-row"><div class="seq">8</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
                </div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 運作中 | 多重代理自動切換 | 自動更新: 10秒
    </div>

<script>
var mtrLine = "TML";
var mtrStation = "TIS";
var lrtStationId = "435"; // 天慈站
// 多重備用CORS代理清單，自動輪流嘗試
const proxyList = [
    "https://corsproxy.io/?",
    "https://api.allorigins.win/get?url=",
    "https://api.codetabs.com/v1/proxy?quest="
];
let currentProxyIndex = 0;

var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function padZero(num) {
    return num < 10 ? '0' + num : num;
}

function updateClock() {
    var now = new Date();
    document.getElementById('clock').innerText = padZero(now.getHours()) + ":" + padZero(now.getMinutes()) + ":" + padZero(now.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

// 屯馬綫渲染
function renderMtrDirection(dataArray, elementId) {
    var container = document.getElementById(elementId);
    var htmlContent = "";
    for (var i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            var ttnt = parseInt(dataArray[i].ttnt, 10);
            var timeDisplay = "";
            if (ttnt === 0) {
                timeDisplay = '<span class="status-flash" style="color:#FF3333">正在駛入</span>';
            } else if (ttnt === 1) {
                timeDisplay = '<span class="status-flash" style="color:#FF3333">即將抵達</span>';
            } else {
                timeDisplay = dataArray[i].time ? dataArray[i].time.substring(11, 16) : "--:--";
            }
            var destName = stationNameMap[dataArray[i].dest] || dataArray[i].dest_tch || dataArray[i].dest;
            htmlContent += '<div class="train-row">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest">' + destName + '</div>' +
                '<div class="arrival-time time-mtr">' + timeDisplay + '</div>' +
                '</div>';
        } else {
            htmlContent += '<div class="train-row">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest">' + (i === 0 ? "班次已完結" : "--") + '</div>' +
                '<div class="arrival-time time-mtr">--:--</div>' +
                '</div>';
        }
    }
    container.innerHTML = htmlContent;
}

function loadMtrSchedule() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=" + mtrLine + "&sta=" + mtrStation, true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var json = JSON.parse(xhr.responseText);
                    var data = json.data[mtrLine + "-" + mtrStation];
                    if (data) {
                        renderMtrDirection(data.UP, "tuen-mun-list");
                        renderMtrDirection(data.DOWN, "wu-kai-sha-list");
                    }
                } catch (e) {
                    console.error("屯馬綫API錯誤：", e);
                }
            } else {
                console.error("屯馬綫請求失敗，狀態碼：", xhr.status);
            }
        }
    };
    xhr.send();
}

// 輕鐵載入核心，多重代理輪流切換
function loadLrtSchedule() {
    const targetUrl = "https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule.php?id=" + lrtStationId;
    const proxyBase = proxyList[currentProxyIndex];
    const fullReqUrl = proxyBase + encodeURIComponent(targetUrl);
    const listBox = document.getElementById("lrt-flat-list");

    const xhr = new XMLHttpRequest();
    xhr.timeout = 8000; // 8秒超時自動切換下一個代理
    xhr.open("GET", fullReqUrl, true);

    xhr.onload = function () {
        if (xhr.status !== 200) {
            switchProxyAndRetry();
            return;
        }
        try {
            let rawText = xhr.responseText;
            let apiData;
            // 兼容三種代理返回格式
            const resJson = JSON.parse(rawText);
            if (resJson.contents) {
                // allorigins格式
                apiData = JSON.parse(resJson.contents);
            } else if (resJson.result) {
                // codetabs格式
                apiData = JSON.parse(resJson.result);
            } else {
                // corsproxy原生返回
                apiData = resJson;
            }

            if (!apiData || !apiData.platform_list || !Array.isArray(apiData.platform_list)) {
                throw new Error("API無月台數據");
            }

            // 收集所有班次
            let allTrains = [];
            apiData.platform_list.forEach(platform => {
                if (!platform.route_list) return;
                platform.route_list.forEach(route => {
                    if (route.route_no) allTrains.push(route);
                });
            });

            // 最多8班
            const showList = allTrains.slice(0, 8);
            let html = "";
            for (let i = 0; i < 8; i++) {
                if (showList[i]) {
                    const item = showList[i];
                    const arriveTxt = item.time_ch || item.time || "-- 分鐘";
                    const dest = item.dest_ch || item.dest || "";
                    let timeHtml = arriveTxt;
                    if (arriveTxt === "到達" || arriveTxt === "即將抵達") {
                        timeHtml = `<span class="status-flash" style="color:#FF3333">${arriveTxt}</span>`;
                    }
                    html += `
                    <div class="train-row lrt-row">
                        <div class="seq">${i+1}</div>
                        <div class="lrt-no">${item.route_no}</div>
                        <div class="dest">往${dest}</div>
                        <div class="arrival-time time-lrt">${timeHtml}</div>
                    </div>`;
                } else {
                    html += `
                    <div class="train-row lrt-row">
                        <div class="seq">${i+1}</div>
                        <div class="lrt-no">--</div>
                        <div class="dest">--</div>
                        <div class="arrival-time time-lrt">-- 分鐘</div>
                    </div>`;
                }
            }
            listBox.innerHTML = html;
            console.log(`輕鐵數據載入成功，使用代理${currentProxyIndex+1}，共${showList.length}班`);
        } catch (err) {
            console.error("輕鐵數據解析失敗：", err);
            switchProxyAndRetry();
        }
    };

    xhr.onerror = switchProxyAndRetry;
    xhr.ontimeout = switchProxyAndRetry;
    xhr.send();
}

// 切換下一個代理重試
function switchProxyAndRetry() {
    currentProxyIndex = (currentProxyIndex + 1) % proxyList.length;
    console.log(`代理連線失敗，切換至第${currentProxyIndex+1}個重試`);
    // 更新畫面提示
    const listBox = document.getElementById("lrt-flat-list");
    listBox.innerHTML = `
        <div class="train-row lrt-row"><div class="seq">1</div><div class="lrt-no">切換代理</div><div class="dest">等候輕鐵數據</div><div class="arrival-time time-lrt">稍後</div></div>
        <div class="train-row lrt-row"><div class="seq">2</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
        <div class="train-row lrt-row"><div class="seq">3</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
        <div class="train-row lrt-row"><div class="seq">4</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
        <div class="train-row lrt-row"><div class="seq">5</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
        <div class="train-row lrt-row"><div class="seq">6</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
        <div class="train-row lrt-row"><div class="seq">7</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
        <div class="train-row lrt-row"><div class="seq">8</div><div class="lrt-no">--</div><div class="dest">--</div><div class="arrival-time time-lrt">-- 分鐘</div></div>
    `;
    setTimeout(loadLrtSchedule, 1200);
}

function updateAllData() {
    loadMtrSchedule();
    loadLrtSchedule();
}

// 頁面一載入立即執行
updateAllData();
setInterval(updateAllData, 10000);
</script>

</body>
</html>
