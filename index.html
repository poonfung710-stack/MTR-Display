<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>天水圍站 下一班車</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang HK","Microsoft JhengHei",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.board{

    width:420px;
    background:#111;
    border:4px solid #666;
    border-radius:15px;
    padding:30px;
}

.title{

    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:25px;

}

.station{

    font-size:26px;
    margin-bottom:30px;
}

.train{

    margin-bottom:30px;
}

.dest{

    font-size:24px;
}

.time{

    font-size:48px;
    color:#00ff66;
    font-weight:bold;
}

.update{

    color:#aaa;
    font-size:18px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="board">

<div class="title">
港鐵 下一班車
</div>

<div class="station">
🚉 天水圍站（屯馬綫）
</div>

<div class="train">

<div class="dest">
→ 往 屯門
</div>

<div class="time" id="down">
--
</div>

</div>

<div class="train">

<div class="dest">
→ 往 烏溪沙
</div>

<div class="time" id="up">
--
</div>

</div>

<div class="update">

更新時間：

<span id="update">
--
</span>

</div>

</div>

<script>

const line="TML";
const station="TIS";

async function load(){

    try{

        const url=`https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${line}&sta=${station}`;

        const response=await fetch(url);

        const json=await response.json();

        const data=json.data[line+"-"+station];

        if(data){

            if(data.DOWN && data.DOWN.length){

                document.getElementById("down").innerHTML=
                data.DOWN[0].ttnt+" 分鐘";

            }

            if(data.UP && data.UP.length){

                document.getElementById("up").innerHTML=
                data.UP[0].ttnt+" 分鐘";

            }

        }

        document.getElementById("update").innerHTML=
        new Date().toLocaleTimeString("zh-HK");

    }

    catch(e){

        console.log(e);

    }

}

load();

setInterval(load,15000);

</script>

</body>
</html>
