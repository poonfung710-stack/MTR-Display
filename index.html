<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴276A｜天祐苑TN593 往太平(上水)實時顯示屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "Noto Sans TC", monospace;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* 巴士電子屏外框 */
        .bus-screen {
            background: #0a0a0a;
            border: 12px solid #222;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 0 40px #ffcc0040;
        }
        .header {
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .route-title {
            color: #ffcc00;
            font-size: 36px;
            font-weight: bold;
        }
        .station-name {
            color: #fff;
            font-size: 22px;
            margin-top: 6px;
        }
        .direction-label {
            color: #ff6666;
            font-size: 20px;
            margin-top: 8px;
        }
        /* 到站列表 三班車 */
        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .eta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 16px;
            border: 1px solid #ffcc0060;
            border-radius: 10px;
        }
        .eta-number {
            color: #ffcc00;
            font-size: 42px;
            width: 60px;
        }
        .eta-dest {
            flex: 1;
            color: #fff;
            font-size: 24px;
            margin-left: 20px;
        }
        .eta-time {
            color: #ffcc00;
            font-size: 46px;
            font-weight: bold;
        }
        .loading-text {
            color: #ffcc00;
            text-align: center;
            font-size: 26px;
            padding: 60px 0;
        }
        .empty-text {
            color: #ff6666;
            text-align: center;
            font-size: 24px;
            padding: 60px 0;
        }
        .error-text {
            color: #ff3333;
            text-align: center;
            font-size: 22px;
            padding: 40px 0;
            line-height: 1.6;
        }
        .footer {
            margin-top: 30px;
            padding-top: 16px;
            border-top: 1px solid #ffcc0040;
            color: #aaa;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="bus-screen">
        <div class="header">
            <div class="route-title">九巴 276A</div>
            <div class="station-name">天祐苑 Tin Yau Court (TN593)</div>
            <div class="direction-label">單向：往太平（上水站）</div>
        </div>

        <div class="eta-list" id="etaContainer">
            <div class="loading-text">正在載入實時到站數據…</div>
        </div>

        <div class="footer">
            <span>數據來源：香港運輸署開放數據</span>
            <span>自動每30秒更新｜最多顯示3班車</span>
        </div>
    </div>

    <script>
        // 修正關鍵參數
        const STOP_ID = "TN593";      // 天祐苑正確站號
        const ROUTE_NUM = "276A";
        const TARGET_DIR = "O";       // O = Outbound 天水圍→太平(上水)
        const DEST_TEXT = "太平 Tai Ping (上水方向)";

        const etaContainer = document.getElementById("etaContainer");

        // 計算剩餘分鐘工具函數
        function getMinLeft(etaIsoStr) {
            const etaTime = new Date(etaIsoStr);
            const now = new Date();
            const diffMs = etaTime - now;
            const diffMin = Math.floor(diffMs / 60000);
            return diffMin >= 0 ? diffMin : 0;
        }

        // 載入實時ETA
        async function loadBusETA() {
            etaContainer.innerHTML = `<div class="loading-text">載入往太平方向實時班次…</div>`;
            try {
                // 官方標準API接口：stop / route / service_type(1=常規班次)
                const apiUrl = `https://data.etabus.gov.hk/v1/transport/kmb/eta/${STOP_ID}/${ROUTE_NUM}/1`;
                const res = await fetch(apiUrl);

                if (!res.ok) throw new Error(`API回應錯誤：${res.status}`);
                const data = await res.json();

                // 過濾只保留往太平(O)方向班次
                const targetEtaList = data.data.filter(item => item.dir === TARGET_DIR);

                if (targetEtaList.length === 0) {
                    etaContainer.innerHTML = `<div class="empty-text">暫無即將到站276A班次</div>`;
                    return;
                }

                // 只取頭3班
                const top3Bus = targetEtaList.slice(0, 3);
                let html = "";
                top3Bus.forEach((bus, idx) => {
                    const remainMin = getMinLeft(bus.eta);
                    html += `
                    <div class="eta-item">
                        <div class="eta-number">${idx+1}</div>
                        <div class="eta-dest">往 ${DEST_TEXT}</div>
                        <div class="eta-time">${remainMin} 分鐘</div>
                    </div>
                    `;
                });
                etaContainer.innerHTML = html;

            } catch (err) {
                etaContainer.innerHTML = `
                <div class="error-text">
                    數據載入失敗<br>
                    原因：${err.message}<br>
                    請確認網絡正常、或稍後重試
                </div>`;
                console.error("API載入異常：", err);
            }
        }

        // 頁面載入立刻執行 + 每30秒自動刷新
        loadBusETA();
        setInterval(loadBusETA, 30000);
    </script>
</body>
</html>
