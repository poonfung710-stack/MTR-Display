<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵乘客資訊顯示系統 (PIDS) - 天水圍站</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    color: #00FF33; /* 經典港鐵 LED 鮮綠字 */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    overflow: hidden;
    padding: 3vh 4vw;
}

/* 頂部資訊列：左邊 24小時制真實時間，右邊車站名稱 */
.header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid #947A4D; /* 屯馬綫代表色線條 */
    padding-bottom: 1.5vh;
}

.real-time {
    font-size: 5vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; /* 確保時間數字對齊不抖動 */
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
}

.station-title {
    font-size: 5vh;
    font-weight: bold;
    color: #FFFFFF; /* 車站名用白色，還原真實車站設計 */
}

/* 班次顯示主要區域 */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around; /* 均分上下行路線空間 */
    margin: 2vh 0;
}

.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 2vh 3vw;
}

.direction-title {
    font-size: 4vh;
    font-weight: bold;
    color: #FFCC00; /* 目的地路綫提示使用經典耀眼黃色 */
    margin-bottom: 1.5vh;
    border-left: 8px solid #947A4D;
    padding-left: 15px;
}

/* 列車班次列表 */
.train-table {
    width: 100%;
}

.train-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1vh 0;
    border-bottom: 1px dashed #222;
}

.train-row:last-child {
    border-bottom: none;
}

/* 班次序號 (1, 2, 3) */
.seq {
    font-size: 3.5vh;
    color: #666666;
    width: 10%;
}

/* 目的地文字 */
.dest {
    font-size: 4vh;
    color: #FFFFFF;
    font-weight: bold;
    width: 50%;
}

/* 24小時制到達時間 */
.arrival-time {
    font-size: 4.5vh;
    font-weight: bold;
    font-family: monospace;
    color: #00FF33;
    text-shadow: 0 0 10px rgba(0, 255, 51, 0.8);
    text-align: right;
    width: 40%;
}

/* 特殊狀態：正在駛入 / 即將抵達 改為紅色閃爍 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}

/* 底部狀態列 */
.footer-bar {
    text-align: right;
    font-size: 2vh;
    color: #444;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍 Tin Shui Wai</div>
    </div>

    <div class="main-content">
        
        <div class="direction-group">
            <div class="direction-title">往 屯門 To Tuen Mun</div>
            <div id="tuen-mun-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">屯門</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">屯門</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">屯門</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

        <div class="direction-group">
            <div class="direction-title">往 烏溪沙 To Wu Kai Sha</div>
            <div id="wu-kai-sha-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">烏溪沙</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">烏溪沙</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">烏溪沙</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS Active | Auto-refresh: 10s
    </div>

<script>
const line = "TML";
const station = "TIS";

// 1. 左上角 24 小時制真實時間 (包含秒)
function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);
updateClock(); // 初始化時鐘

// 2. 格式化 API 回傳的時間數據
function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    
    const ttnt = parseInt(trainObj.ttnt, 10);
    let timeDisplay = "";
    
    // 如果剩下 0 或 1 分鐘，還原月台顯示「正在駛入」或「即將抵達」的紅字閃爍效果
    if (ttnt === 0) {
        timeDisplay = `<span class="status-flash">正在駛入 Arriving</span>`;
    } else if (ttnt === 1) {
        timeDisplay = `<span class="status-flash">即將抵達 Dept</span>`;
    } else {
        // 從 API 傳回的 "YYYY-MM-DD HH:MM:SS" 之中，截取 24小時制的 "HH:MM"
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
        } else {
            timeDisplay = "--:--";
        }
    }

    // 格式化目的地中英文顯示
    const destName = trainObj.dest === "TUM" ? "屯門 Tuen Mun" : "烏溪沙 Wu Kai Sha";

    return {
        dest: destName,
        time: timeDisplay
    };
}

// 3. 渲染單向的下三班列車
function renderDirection(dataArray, elementId) {
    const container = document.getElementById(elementId);
    container.innerHTML = ""; // 先清空舊內容

    // 港鐵 API 每方向最多提供 4 班車，我們固定只取前 3 班
    for (let i = 0; i < 3; i++) {
        if (dataArray && dataArray[i]) {
            const info = formatMtrTime(dataArray[i]);
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${info.dest}</div>
                    <div class="arrival-time">${info.time}</div>
                </div>
            `;
        } else {
            // 如果深夜尾班車過後沒有後續班次
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${i === 0 ? "班次已完結 Service Ended" : "--"}</div>
                    <div class="arrival-time">--:--</div>
                </div>
            `;
        }
    }
}

// 4. 主載入函式
async function loadSchedule() {
    try {
        const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${line}&sta=${station}`;
        const response = await fetch(url);
        const json = await response.json();
        const data = json.data[`${line}-${station}`];

        if (data) {
            // 【已修正】港鐵 API 規定：屯馬綫 UP 是往屯門，DOWN 是往烏溪沙
            renderDirection(data.UP, "tuen-mun-list");       // 往屯門 (使用 UP 數據)
            renderDirection(data.DOWN, "wu-kai-sha-list");   // 往烏溪沙 (使用 DOWN 數據)
        }
    } catch (e) {
        console.error("MTR API Error:", e);
    }
}

// 首次加載班次
loadSchedule();

// 每 10 秒自動更新一次下班車資訊
setInterval(loadSchedule, 10000);
</script>

</body>
</html>
