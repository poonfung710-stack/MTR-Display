<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天慈站輕鐵下班車顯示屏 | Tin Tsz PIDS</title>
    <style>
        /* 引入點陣體電子字型與繁體中文字型 */
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+HK:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Noto Sans HK', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 顯示屏外框（模擬月台懸掛式燈箱） */
        .pids-container {
            width: 100%;
            max-width: 850px;
            background-color: #050505;
            border: 8px solid #2d2d2d;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* 顯示屏頂部（站名與目前時間） */
        .pids-header {
            background-color: #111111;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #222222;
        }

        .station-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00ffcc; 
            text-shadow: 0 0 8px rgba(0,255,204,0.6);
        }

        .station-name span {
            font-size: 1.3rem;
            margin-left: 8px;
            font-weight: 500;
        }

        .current-time {
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            color: #ff9900;
            text-shadow: 0 0 8px rgba(255,153,0,0.6);
            letter-spacing: 1px;
        }

        /* 班次表格頂部欄目 */
        .pids-table-header {
            display: grid;
            grid-template-columns: 1.5fr 3.5fr 1.5fr 1.5fr;
            padding: 10px 25px;
            background-color: #161616;
            color: #888888;
            font-size: 0.9rem;
            border-bottom: 1px solid #222222;
            text-align: center;
        }

        .pids-table-header div:nth-child(2) {
            text-align: left;
            padding-left: 15px;
        }

        /* 班次列表區域 */
        .pids-body {
            padding: 5px 0;
            min-height: 260px;
        }

        /* 單行班次 */
        .train-row {
            display: grid;
            grid-template-columns: 1.5fr 3.5fr 1.5fr 1.5fr;
            padding: 14px 25px;
            align-items: center;
            text-align: center;
            color: #ff9900;
            font-family: 'VT323', 'Noto Sans HK', monospace;
            font-size: 1.9rem;
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(255,153,0,0.7);
            border-bottom: 1px dashed #222222;
        }

        .train-row:last-child {
            border-bottom: none;
        }

        /* 路線編號外框 */
        .route-num {
            font-weight: 700;
            background-color: #1c1100;
            border: 2px solid #ff9900;
            border-radius: 4px;
            padding: 0px 10px;
            display: inline-block;
            min-width: 65px;
            text-align: center;
        }

        /* 目的地 */
        .destination {
            text-align: left;
            font-size: 1.6rem;
            font-weight: 700;
            padding-left: 15px;
        }

        .destination span {
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            margin-left: 8px;
            font-weight: 500;
        }

        /* 車廂數目 (拖卡/單卡) */
        .cars {
            font-size: 1.3rem;
            color: #ffbe3b;
        }

        /* 到站時間 */
        .arrival-time {
            font-weight: 700;
            color: #ffaa00;
        }

        /* 正在到站的閃爍效果 */
        .eta-now {
            color: #ff3300;
            text-shadow: 0 0 10px rgba(255,51,0,0.8);
            animation: blink 1s infinite;
            font-weight: 700;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* 底部裝飾與說明 */
        .pids-footer {
            background-color: #111111;
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            color: #444444;
            border-top: 2px solid #222222;
        }

        .github-tips {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666666;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="pids-container">
        <!-- 頂部資訊欄 -->
        <div class="pids-header">
            <div class="station-name">天慈 <span>Tin Tsz</span></div>
            <div class="current-time" id="clock">00:00:00</div>
        </div>

        <!-- 欄目表頭 -->
        <div class="pids-table-header">
            <div>路線 Route</div>
            <div>目的地 Destination</div>
            <div>車廂 Cars</div>
            <div>等候時間 Min</div>
        </div>

        <!-- 班次動態內容 -->
        <div class="pids-body" id="pids-list">
            <!-- 由 JavaScript 自動動態載入 -->
        </div>

        <!-- 底部裝飾線 -->
        <div class="pids-footer">
            MTR Light Rail Real-time Information Display System Simulation
        </div>
    </div>

    <div class="github-tips">
        預設模擬天慈站 (705, 706, 751) 班次資訊 • 每 30 秒自動更新倒數
    </div>

    <script>
        // 即時更新電子鐘
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 模擬行經天慈站的輕鐵路線數據
        let mockTrains = [
            { route: '706', destCh: '天水圍循環線', destEn: 'Tin Shui Wai Loop', cars: 2, eta: 1 },
            { route: '751', destCh: '友愛', destEn: 'Yau Oi', cars: 1, eta: 4 },
            { route: '705', destCh: '天水圍循環線', destEn: 'Tin Shui Wai Loop', cars: 2, eta: 7 },
            { route: '751', destCh: '天逸', destEn: 'Tin Yat', cars: 1, eta: 12 }
        ];

        // 渲染畫面
        function renderPIDS() {
            const listContainer = document.getElementById('pids-list');
            listContainer.innerHTML = '';

            // 依據抵達時間排序
            mockTrains.sort((a, b) => a.eta - b.eta);

            mockTrains.forEach(train => {
                const row = document.createElement('div');
                row.className = 'train-row';

                // 處理即將到站 (0分鐘) 的特殊動態顯示
                let etaDisplay = train.eta + ' min';
                if (train.eta <= 0) {
                    etaDisplay = '<span class="eta-now">到站中 NOW</span>';
                }

                const carDisplay = train.cars === 2 ? '拖卡 Double' : '單卡 Single';

                row.innerHTML = `
                    <div><span class="route-num">${train.route}</span></div>
                    <div class="destination">${train.destCh}<span>${train.destEn}</span></div>
                    <div class="cars">${carDisplay}</div>
                    <div class="arrival-time">${etaDisplay}</div>
                `;
                listContainer.appendChild(row);
            });
        }

        // 模擬每 30 秒時間流逝倒數
        function simulateCountdown() {
            mockTrains.forEach((train) => {
                if (train.eta > 0) {
                    train.eta -= 1;
                } else {
                    // 到站後隨機生成下一班車的時間 (10 - 17 分鐘後)
                    train.eta = Math.floor(Math.random() * 8) + 10; 
                }
            });
            renderPIDS();
        }

        // 初始化
        renderPIDS();
        // 每 30 秒執行一次倒數
        setInterval(simulateCountdown, 30000); 
    </script>

</body>
</html>
