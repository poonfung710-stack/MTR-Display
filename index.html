<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天水圍交通綜合資訊屏 (PIDS 完美模擬版)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+HK:wght@500;700&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Noto Sans HK', sans-serif;
            box-sizing: border-box;
        }

        body {
            padding: 1.5vh 2vw;
            display: flex;
            flex-direction: column;
        }

        /* 頂部資訊列 */
        .header-bar {
            height: 8vh;
            border-bottom: 4px solid #947A4D;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 0.8vh;
        }

        .real-time {
            font-family: 'VT323', monospace;
            font-size: 5vh;
            font-weight: bold;
            color: #00FF33;
            text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
            line-height: 1;
        }

        .station-title {
            font-size: 4.5vh;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1;
        }

        /* 主要分欄區域 */
        .main-content {
            height: 87vh;
            margin: 1.5vh 0 0 0;
            display: flex;
            gap: 2vw;
        }

        .left-col, .right-col {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 容器區塊 */
        .direction-group {
            background-color: #050505;
            border: 4px solid #2d2d2d;
            border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
            padding: 1.5vh 2vw;
            box-sizing: border-box;
        }

        /* 區塊高度分配 */
        .mtr-group { 
            height: 42.5vh; 
            margin-bottom: 2vh;
        }
        .lrt-full-group { 
            height: 87vh; 
        }

        /* 標題樣式 */
        .direction-title {
            font-weight: bold;
            margin-bottom: 1vh;
            padding-left: 10px;
            font-size: 3.2vh;
            line-height: 1.2;
        }
        .title-mtr { color: #FFCC00; border-left: 6px solid #947A4D; }
        .title-lrt { color: #ff9900; border-left: 6px solid #ff9900; }

        /* 列表行排版 */
        .train-row {
            width: 100%;
            border-bottom: 1px dashed #222;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'VT323', 'Noto Sans HK', monospace;
            letter-spacing: 1px;
        }
        .train-row:last-child { border-bottom: none; }

        /* 地鐵行高與字體 */
        .mtr-row {
            height: 7.2vh;
            font-size: 3.6vh;
        }
        /* 輕鐵行高與字體 (8班車緊湊均衡分配) */
        .lrt-row {
            height: 9vh;
            font-size: 4.2vh;
        }

        /* 左側資訊組合 (編號 + 目的地) */
        .train-info-left {
            display: flex;
            align-items: center;
            gap: 1.5vw;
            color: #ffffff;
        }

        /* 路線編號外框 */
        .route-num {
            font-weight: 700;
            border-radius: 4px;
            padding: 0 8px;
            text-align: center;
            display: inline-block;
        }
        .mtr-no {
            background-color: #1a1500;
            border: 2px solid #FFCC00;
            color: #FFCC00;
            font-size: 3.2vh;
            min-width: 90px;
        }
        .lrt-no {
            background-color: #1c1100;
            border: 2px solid #ff9900;
            color: #ff9900;
            font-size: 3.8vh;
            min-width: 75px;
        }

        /* 目的地文字 */
        .destination {
            font-weight: 700;
        }

        /* 到站時間 */
        .arrival-time {
            font-weight: 700;
            text-align: right;
        }
        .time-mtr { color: #00FF33; text-shadow: 0 0 6px rgba(0,255,51,0.7); }
        .time-lrt { color: #ffaa00; text-shadow: 0 0 6px rgba(255,153,0,0.7); }

        /* 正在到站閃爍 */
        .eta-now {
            color: #ff3300;
            text-shadow: 0 0 10px rgba(255,51,0,0.8);
            -webkit-animation: blink 1s infinite;
            animation: blink 1s infinite;
        }

        @-webkit-keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* 頁尾 */
        .footer-bar {
            height: 2vh;
            text-align: right;
            font-size: 1.5vh;
            color: #444444;
            margin-top: 0.5vh;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-group">
                <div class="direction-title title-mtr">屯馬綫 往屯門方向</div>
                <div id="tuen-mun-list"></div>
            </div>
            
            <div class="direction-group mtr-group">
                <div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div>
                <div id="wu-kai-sha-list"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group lrt-full-group">
                <div class="direction-title title-lrt">輕鐵 天慈站 (下一班列車)</div>
                <div id="lrt-flat-list"></div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        MTR PIDS Integrated System Simulation • Local Engine Active
    </div>

    <script>
        // 1. 電子鐘邏輯
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 模擬數據源
        // 地鐵屯門方向 (上行)
        let mtrUpTrains = [
            { route: 'TML', dest: '屯門', eta: 2 },
            { route: 'TML', dest: '屯門', eta: 8 },
            { route: 'TML', dest: '屯門', eta: 14 },
            { route: 'TML', dest: '屯門', eta: 20 }
        ];

        // 地鐵烏溪沙方向 (下行)
        let mtrDownTrains = [
            { route: 'TML', dest: '烏溪沙', eta: 1 },
            { route: 'TML', dest: '烏溪沙', eta: 6 },
            { route: 'TML', dest: '烏溪沙', eta: 12 },
            { route: 'TML', dest: '烏溪沙', eta: 18 }
        ];

        // 輕鐵天慈站混合方向 (精確分配8班車)
        let lrtTrains = [
            { route: '706', dest: '天水圍循環線', eta: 1 },
            { route: '751', dest: '友愛', eta: 3 },
            { route: '705', dest: '天水圍循環線', eta: 5 },
            { route: '751', dest: '天逸', eta: 8 },
            { route: '706', dest: '天水圍循環線', eta: 10 },
            { route: '751', dest: '友愛', eta: 13 },
            { route: '705', dest: '天水圍循環線', eta: 16 },
            { route: '751', dest: '天逸', eta: 19 }
        ];

        // 3. 渲染地鐵畫面 (固定4班)
        function renderMTR(trains, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            trains.sort((a, b) => a.eta - b.eta);

            trains.forEach(train => {
                const row = document.createElement('div');
                row.className = 'train-row mtr-row';

                let etaDisplay = train.eta + ' 分鐘';
                if (train.eta <= 0) {
                    etaDisplay = '<span class="eta-now">正在駛入</span>';
                }

                row.innerHTML = `
                    <div class="train-info-left">
                        <span class="route-num mtr-no">${train.route}</span>
                        <span class="destination">往${train.dest}</span>
                    </div>
                    <div class="arrival-time time-mtr">${etaDisplay}</div>
                `;
                container.appendChild(row);
            });
        }

        // 4. 渲染輕鐵畫面 (精準符合：編號 + 往目的地 + 餘下分鐘，固定8班)
        function renderLRT() {
            const container = document.getElementById('lrt-flat-list');
            container.innerHTML = '';
            lrtTrains.sort((a, b) => a.eta - b.eta);

            lrtTrains.forEach(train => {
                const row = document.createElement('div');
                row.className = 'train-row lrt-row';

                let etaDisplay = train.eta + ' 分鐘';
                if (train.eta <= 0) {
                    etaDisplay = '<span class="eta-now">到站中 NOW</span>';
                }

                row.innerHTML = `
                    <div class="train-info-left">
                        <span class="route-num lrt-no">${train.route}</span>
                        <span class="destination">往${train.dest}</span>
                    </div>
                    <div class="arrival-time time-lrt">${etaDisplay}</div>
                `;
                container.appendChild(row);
            });
        }

        // 全螢幕刷新調度
        function refreshDisplay() {
            renderMTR(mtrUpTrains, 'tuen-mun-list');
            renderMTR(mtrDownTrains, 'wu-kai-sha-list');
            renderLRT();
        }

        // 5. 倒數計時模擬器 (每 30 秒倒數 1 分鐘)
        function startCountdown() {
            // 地鐵上行遞減
            mtrUpTrains.forEach(t => {
                if (t.eta > 0) t.eta--;
                else t.eta = Math.floor(Math.random() * 5) + 18;
            });
            // 地鐵下行遞減
            mtrDownTrains.forEach(t => {
                if (t.eta > 0) t.eta--;
                else t.eta = Math.floor(Math.random() * 5) + 16;
            });
            // 輕鐵遞減
            lrtTrains.forEach(t => {
                if (t.eta > 0) t.eta--;
                else t.eta = Math.floor(Math.random() * 6) + 17;
            });

            refreshDisplay();
        }

        // 初次加載執行
        refreshDisplay();
        
        // 設定每 30 秒執行一次時間倒數
        setInterval(startCountdown, 30000);
    </script>
</body>
</html>
