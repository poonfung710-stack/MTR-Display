<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合資訊顯示系統 (PIDS)</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
    padding: 1.5vh 2vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #947A4D; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要分欄區域 */
.main-content {
    height: 88vh; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    margin: 1.5vh 0 0 0; 
    box-sizing: border-box;
}

/* 左右對半分 */
.left-col, .right-col {
    width: 48%; 
    height: 100%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
}

.mtr-panel {
    height: 48%;
    margin-bottom: 4%;
}
.mtr-panel:last-child {
    margin-bottom: 0;
}

.lrt-panel {
    height: 62%; 
    margin-bottom: 4%;
}

.bus-panel {
    height: 34%; 
    margin-bottom: 0;
}

/* 容器群組 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.2vh 2vw; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
}

.direction-title {
    font-size: 3.8vh; 
    font-weight: bold;
    margin-bottom: 0.6vh;
    padding-left: 15px;
    line-height: 1.2;
}
.title-mtr { color: #FFCC00; border-left: 8px solid #947A4D; }
.title-lrt { color: #FF9900; border-left: 8px solid #FF9900; }
.title-bus { color: #FF3366; border-left: 8px solid #FF3366; } 

/* 列表容器 */
.train-list-container {
    height: 88%; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}
.train-row:last-child {
    border-bottom: none;
}

/* 欄位尺寸與字體 */
.seq {
    font-size: 3vh;
    color: #666666;
    width: 8%;
}

/* 左側港鐵字體 */
.left-col .dest-mtr { font-size: 4.2vh; color: #FFFFFF; font-weight: bold; width: 47%; white-space: nowrap; overflow: hidden; }
.left-col .time-mtr { font-size: 4.4vh; font-weight: bold; font-family: monospace; text-align: right; width: 30%; color: #00FF33; text-shadow: 0 0 12px rgba(0, 255, 51, 0.8); }

/* 右側輕鐵字體 (8班車版) */
.lrt-no { font-size: 3.2vh; font-weight: bold; color: #FF9900; width: 15%; }
.dest-lrt { font-size: 3.2vh; color: #FFFFFF; font-weight: bold; white-space: nowrap; overflow: hidden; width: 47%; }
.time-lrt { font-size: 3.4vh; font-weight: bold; font-family: monospace; text-align: right; width: 30%; color: #FFCC00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.8); }

/* 右側巴士字體 (3班車版) */
.dest-bus {
    font-size: 3.6vh; 
    color: #FFFFFF;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    width: 62%;
}
.time-bus {
    font-size: 3.4vh; 
    font-weight: bold;
    font-family: monospace;
    text-align: right;
    width: 30%;
    color: #FF99CC; 
    text-shadow: 0 0 10px rgba(255, 51, 102, 0.8);
}

/* 紅色閃爍狀態 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}

@-webkit-keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
@keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }

.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.6vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天祐苑交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-panel">
                <div class="direction-title title-mtr">屯馬綫 往屯門方向</div>
                <div class="train-list-container" id="tuen-mun-list">
                    <div class="train-row" style="height:25%;"><div class="seq">1</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row" style="height:25%;"><div class="seq">2</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row" style="height:25%;"><div class="seq">3</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row" style="height:25%;"><div class="seq">4</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                </div>
            </div>

            <div class="direction-group mtr-panel">
                <div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div>
                <div class="train-list-container" id="wu-kai-sha-list">
                    <div class="train-row" style="height:25%;"><div class="seq">1</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row" style="height:25%;"><div class="seq">2</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row" style="height:25%;"><div class="seq">3</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row" style="height:25%;"><div class="seq">4</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group lrt-panel">
                <div class="direction-title title-lrt">輕鐵 天慈站</div>
                <div class="train-list-container" id="lrt-flat-list">
                    </div>
            </div>

            <div class="direction-group bus-panel">
                <div class="direction-title title-bus">九巴 276A 天祐苑站</div>
                <div class="train-list-container" id="bus-flat-list">
                    </div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 智能資訊屏 | 輕鐵8班/九巴3班 最佳化版 | 自動更新
    </div>

<script>
var mtrLine = "TML";
var mtrStation = "TIS";

var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function padZero(num) {
    return num < 10 ? '0' + num : num;
}

function updateClock() {
    var clockEl = document.getElementById('clock');
    if (!clockEl) return;
    var now = new Date();
    var hours = padZero(now.getHours());
    var minutes = padZero(now.getMinutes());
    var seconds = padZero(now.getSeconds());
    clockEl.innerText = hours + ':' + minutes + ':' + seconds;
}
setInterval(updateClock, 1000);
updateClock();

// ==========================================
// 右邊上方：輕鐵 天慈站 (已連接真實 MTR ETA API)
// ==========================================
function renderRealLrtPIDS(etas) {
    var listContainer = document.getElementById('lrt-flat-list'); 
    if (!listContainer) return;
    
    var htmlString = '';
    var displayCount = 8; 
    
    for (var i = 0; i < displayCount; i++) {
        if (i < etas.length) {
            var train = etas[i];
            var timeCh = train.time_ch;
            var etaDisplay = timeCh;
            
            // 觸發即將抵達、正在離開的紅色閃爍狀態
            if (timeCh === '即將抵達' || timeCh === '正在離開' || timeCh === '-' || timeCh === 'Arriving') {
                etaDisplay = '<span class="status-flash">' + (timeCh === '-' ? '即將抵達' : timeCh) + '</span>';
            } 
            
            // 擷取目的地並將 705/706 天水圍循環綫補上(北)/(南)方向，以符合你的原始設計
            var destText = train.dest_ch;
            if (train.route_no === '705' && destText === '天水圍') {
                destText = '天水圍(北)';
            } else if (train.route_no === '706' && destText === '天水圍') {
                destText = '天水圍(南)';
            }

            htmlString += '<div class="train-row" style="height:' + (100 / displayCount) + '%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="lrt-no">' + train.route_no + '</div>' +
                '<div class="dest dest-lrt">往' + destText + '</div>' +
                '<div class="arrival-time time-lrt">' + etaDisplay + '</div>' +
                '</div>';
        } else {
            // 無班次時的備用顯示，防止版面高度跑掉
            var defaultMsg = (i === 0) ? "暫無班次" : "--";
            htmlString += '<div class="train-row" style="height:' + (100 / displayCount) + '%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="lrt-no">--</div>' +
                '<div class="dest dest-lrt">' + defaultMsg + '</div>' +
                '<div class="arrival-time time-lrt">--</div>' +
                '</div>';
        }
    }
    listContainer.innerHTML = htmlString;
}

function loadLrtSchedule() {
    // 天慈站 Station ID = 435
    var url = 'https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=435';
    
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                if (json.status !== 1 || !json.platform_list) return;
                
                var allTrains = [];
                
                // 天慈站包含雙向月台，此處將兩個月台的數據全部合併處理
                for (var p = 0; p < json.platform_list.length; p++) {
                    var platform = json.platform_list[p];
                    if (platform.route_list) {
                        for (var r = 0; r < platform.route_list.length; r++) {
                            var train = platform.route_list[r];
                            
                            // 將 "X 分鐘" 轉為純數字以便精準排序，即將抵達與 - 視為 0 分鐘
                            var etaMinutes = 999; 
                            if (train.time_ch) {
                                if (train.time_ch.indexOf('分鐘') !== -1) {
                                    etaMinutes = parseInt(train.time_ch.replace(/[^0-9]/g, ''));
                                } else if (train.time_ch === '即將抵達' || train.time_ch === '正在離開' || train.time_ch === '-') {
                                    etaMinutes = 0; 
                                }
                            }
                            
                            train.etaNumeric = etaMinutes;
                            allTrains.push(train);
                        }
                    }
                }
                
                // 依照抵達時間由近到遠（從小到大）全局排序
                allTrains.sort(function(a, b) {
                    return a.etaNumeric - b.etaNumeric;
                });
                
                renderRealLrtPIDS(allTrains);
                
            } catch (e) {
                console.error("輕鐵 ETA API 解析錯誤:", e);
            }
        }
    };
    xhr.send();
}

loadLrtSchedule();
setInterval(loadLrtSchedule, 10000);

// ==========================================
// 右邊下方：九巴 276A 天祐苑站 (已連接真實 ETA API)
// ==========================================
function renderRealBusPIDS(etas) {
    var listContainer = document.getElementById('bus-flat-list');
    if (!listContainer) return;
    
    var htmlString = '';
    var displayCount = 3; 
    
    for (var i = 0; i < displayCount; i++) {
        if (i < etas.length) {
            var item = etas[i];
            
            var etaDate = new Date(item.eta);
            var now = new Date();
            var diffMs = etaDate.getTime() - now.getTime();
            var diffMins = Math.floor(diffMs / 60000);
            
            var etaDisplay = '';
            if (diffMins <= 0) {
                etaDisplay = '<span class="status-flash">到站中</span>';
            } else {
                etaDisplay = diffMins + ' 分鐘';
            }
            
            var destText = "上水"; 
            if (item.dest_tc) {
                destText = item.dest_tc.split('(')[0].split('（')[0].trim();
            }

            htmlString += '<div class="train-row" style="height:33.3%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-bus">往' + destText + '</div>' +
                '<div class="arrival-time time-bus">' + etaDisplay + '</div>' +
                '</div>';
        } else {
            var defaultMsg = (i === 0) ? "暫無班次" : "--";
            htmlString += '<div class="train-row" style="height:33.3%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-bus">' + defaultMsg + '</div>' +
                '<div class="arrival-time time-bus">--</div>' +
                '</div>';
        }
    }
    listContainer.innerHTML = htmlString;
}

function loadBusSchedule() {
    var route = "276A";
    var url = 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/' + route + '/1';
    
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                if (!json || !json.data) return;
                
                var etas = [];
                for (var i = 0; i < json.data.length; i++) {
                    var item = json.data[i];
                    
                    var isCancelled = item.rmk_tc && item.rmk_tc.indexOf('取消') !== -1;
                    if (item.dir === 'O' && item.seq == 9 && item.eta && !isCancelled) {
                        etas.push(item);
                    }
                }
                
                etas.sort(function(a, b) {
                    return new Date(a.eta) - new Date(b.eta);
                });
                
                renderRealBusPIDS(etas.slice(0, 3));
                
            } catch (e) {
                console.error("九巴 ETA API 解析錯誤:", e);
            }
        }
    };
    xhr.send();
}

loadBusSchedule();
setInterval(loadBusSchedule, 10000);

// ==========================================
// 左邊：港鐵資料聯網核心
// ==========================================
function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    var ttnt = parseInt(trainObj.ttnt, 10);
    var timeDisplay = "";
    if (ttnt === 0) {
        timeDisplay = '<span class="status-flash">正在駛入</span>';
    } else if (ttnt === 1) {
        timeDisplay = '<span class="status-flash">即將抵達</span>';
    } else {
        timeDisplay = trainObj.time ? trainObj.time.substring(11, 16) : "--:--";
    }
    var rawDest = trainObj.dest;
    var destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;
    return { dest: destName, time: timeDisplay };
}

function renderMtrDirection(dataArray, elementId) {
    var container = document.getElementById(elementId);
    if (!container) return;
    
    var htmlString = "";
    for (var i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            var info = formatMtrTime(dataArray[i]);
            htmlString += '<div class="train-row" style="height:25%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + info.dest + '</div>' +
                '<div class="arrival-time time-mtr">' + info.time + '</div>' +
                '</div>';
        } else {
            var defaultMsg = (i === 0) ? "班次已完結" : "--";
            htmlString += '<div class="train-row" style="height:25%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + defaultMsg + '</div>' +
                '<div class="arrival-time time-mtr">--:--</div>' +
                '</div>';
        }
    }
    container.innerHTML = htmlString;
}

function loadMtrSchedule() {
    var url = 'https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=' + mtrLine + '&sta=' + mtrStation;
    
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var json = JSON.parse(xhr.responseText);
                    if (!json || !json.data) return;
                    var data = json.data[mtrLine + '-' + mtrStation];
                    if (data) {
                        renderMtrDirection(data.UP, "tuen-mun-list");       
                        renderMtrDirection(data.DOWN, "wu-kai-sha-list");   
                    }
                } catch (e) {
                    console.error("JSON Parse Error");
                }
            }
        }
    };
    xhr.send();
}

loadMtrSchedule();
setInterval(loadMtrSchedule, 10000);
</script>

</body>
</html>
