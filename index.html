<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合資訊顯示系統 (PIDS)</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    /* iOS 9 Flexbox 相容前綴 */
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
    padding: 1.5vh 2vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #947A4D; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要分欄區域 */
.main-content {
    height: 88vh; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    margin: 1.5vh 0 0 0; 
    box-sizing: border-box;
}

/* 左右對半分 50% */
.left-col, .right-col {
    width: 48%; /* 稍微縮小寬度防止舊版 Safari 擠壓換行 */
    height: 100%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
}

/* 左側兩個面板各佔 48% 高度，中間預留 4% 間距 */
.mtr-panel {
    height: 48%;
    margin-bottom: 4%;
}
.mtr-panel:last-child {
    margin-bottom: 0;
}

/* 右側利用固定百分比直接切分，徹底解決 iOS 9 不懂 flex 比例的問題 */
.lrt-panel {
    height: 56%;
    margin-bottom: 4%;
}

.bus-panel {
    height: 40%;
    margin-bottom: 0;
}

/* 容器群組 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.2vh 2vw; 
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    box-sizing: border-box;
}

.direction-title {
    font-size: 3.8vh; 
    font-weight: bold;
    margin-bottom: 0.6vh;
    padding-left: 15px;
    line-height: 1.2;
}
.title-mtr { color: #FFCC00; border-left: 8px solid #947A4D; }
.title-lrt { color: #FF9900; border-left: 8px solid #FF9900; }
.title-bus { color: #FF3366; border-left: 8px solid #FF3366; } 

/* 列表容器 */
.train-list-container {
    height: 80%; /* 給予固定高度百分比，確保內部表格能撐開 */
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
    height: 20%; /* 讓每一行都有固定佔比 */
}
.train-row:last-child {
    border-bottom: none;
}

/* 欄位尺寸 */
.seq {
    font-size: 3.4vh;
    color: #666666;
    width: 8%;
}

.lrt-no {
    font-size: 4vh;
    font-weight: bold;
    color: #FF9900;
    width: 15%;
}

.dest {
    font-size: 4.2vh;
    color: #FFFFFF;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
}
.dest-mtr, .dest-lrt { width: 47%; }
.dest-bus { width: 62%; } 

.arrival-time {
    font-size: 4.4vh;
    font-weight: bold;
    font-family: monospace;
    text-align: right;
    width: 30%;
}
.time-mtr { color: #00FF33; text-shadow: 0 0 12px rgba(0, 255, 51, 0.8); }
.time-lrt { color: #FFCC00; text-shadow: 0 0 12px rgba(255, 204, 0, 0.8); }
.time-bus { color: #FF99CC; text-shadow: 0 0 12px rgba(255, 51, 102, 0.8); }

/* 紅色閃爍狀態 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}

@-webkit-keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
@keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }

.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.6vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天祐苑交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-panel">
                <div class="direction-title title-mtr">屯馬綫 往屯門方向</div>
                <div class="train-list-container" id="tuen-mun-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest dest-mtr">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest dest-mtr">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest dest-mtr">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>

            <div class="direction-group mtr-panel">
                <div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div>
                <div class="train-list-container" id="wu-kai-sha-list">
                    <div class="train-row"><div class="seq">1</div><div class="dest dest-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row"><div class="seq">2</div><div class="dest dest-mtr">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">3</div><div class="dest dest-mtr">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row"><div class="seq">4</div><div class="dest dest-mtr">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group lrt-panel">
                <div class="direction-title title-lrt">輕鐵 天慈站</div>
                <div class="train-list-container" id="lrt-flat-list">
                    </div>
            </div>

            <div class="direction-group bus-panel">
                <div class="direction-title title-bus">九巴 276A 天祐苑站</div>
                <div class="train-list-container" id="bus-flat-list">
                    </div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 智能資訊屏 | iOS 9 內核徹底修復版 | 自動更新
    </div>

<script>
// 嚴格將所有變數宣告還原為舊版傳統 var
var mtrLine = "TML";
var mtrStation = "TIS";

var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function padZero(num) {
    return num < 10 ? '0' + num : num;
}

// 修正時鐘：確保舊版瀏覽器能順利抓到 DOM 且順暢執行
function updateClock() {
    var clockEl = document.getElementById('clock');
    if (!clockEl) return;
    var now = new Date();
    var hours = padZero(now.getHours());
    var minutes = padZero(now.getMinutes());
    var seconds = padZero(now.getSeconds());
    clockEl.innerText = hours + ':' + minutes + ':' + seconds;
}
setInterval(updateClock, 1000);
updateClock();

// ==========================================
// 右邊上方：輕鐵 天慈站 (資料核心)
// ==========================================
var lrtTrains = [
    { route: '706', dest: '天水圍', eta: 1 },
    { route: '751', dest: '友愛', eta: 3 },
    { route: '705', dest: '天水圍', eta: 6 },
    { route: '751', dest: '天逸', eta: 9 },
    { route: '706', dest: '天水圍', eta: 13 }
];

function renderLrtPIDS() {
    var listContainer = document.getElementById('lrt-flat-list');
    if (!listContainer) return;
    
    listContainer.innerHTML = '';
    
    // 改用傳統的匿名排序函數，防止箭頭函數在 iOS 9 閃退
    lrtTrains.sort(function(a, b) { return a.eta - b.eta; });

    var htmlString = '';
    for (var i = 0; i < lrtTrains.length; i++) {
        var train = lrtTrains[i];
        var etaDisplay = train.eta + ' 分鐘';
        if (train.eta <= 0) {
            etaDisplay = '<span class="status-flash">到達</span>';
        }

        var finalDest = "往" + train.dest;
        if (train.route === '705') {
            finalDest = "往天水圍(北)";
        } else if (train.route === '706') {
            finalDest = "往天水圍(南)";
        }

        // 徹底展開成單行字串拼接，確保舊 WebKit 引擎解析 100% 成功
        htmlString += '<div class="train-row" style="height:20%;">' +
            '<div class="seq">' + (i + 1) + '</div>' +
            '<div class="lrt-no">' + train.route + '</div>' +
            '<div class="dest dest-lrt">' + finalDest + '</div>' +
            '<div class="arrival-time time-lrt">' + etaDisplay + '</div>' +
            '</div>';
    }
    listContainer.innerHTML = htmlString;
}

function simulateLrtCountdown() {
    for (var i = 0; i < lrtTrains.length; i++) {
        if (lrtTrains[i].eta > 0) {
            lrtTrains[i].eta -= 1;
        } else {
            lrtTrains[i].eta = Math.floor(Math.random() * 6) + 10; 
        }
    }
    renderLrtPIDS();
}
setInterval(simulateLrtCountdown, 30000);
renderLrtPIDS();


// ==========================================
// 右邊下方：九巴 天祐苑
// ==========================================
var busTrains = [
    { dest: '上水', eta: 4 },
    { dest: '上水', eta: 12 },
    { dest: '上水', eta: 20 },
    { dest: '上水', eta: 28 }
];

function renderBusPIDS() {
    var listContainer = document.getElementById('bus-flat-list');
    if (!listContainer) return;
    
    listContainer.innerHTML = '';
    busTrains.sort(function(a, b) { return a.eta - b.eta; });

    var htmlString = '';
    for (var i = 0; i < busTrains.length; i++) {
        var bus = busTrains[i];
        var etaDisplay = bus.eta + ' 分鐘';
        if (bus.eta <= 0) {
            etaDisplay = '<span class="status-flash">到站中</span>';
        }

        htmlString += '<div class="train-row" style="height:25%;">' +
            '<div class="seq">' + (i + 1) + '</div>' +
            '<div class="dest dest-bus">往' + bus.dest + '</div>' +
            '<div class="arrival-time time-bus">' + etaDisplay + '</div>' +
            '</div>';
    }
    listContainer.innerHTML = htmlString;
}

function simulateBusCountdown() {
    for (var i = 0; i < busTrains.length; i++) {
        if (busTrains[i].eta > 0) {
            busTrains[i].eta -= 1;
        } else {
            busTrains[i].eta = Math.floor(Math.random() * 5) + 8; 
        }
    }
    renderBusPIDS();
}
setInterval(simulateBusCountdown, 30000);
renderBusPIDS();


// ==========================================
// 左邊：港鐵實時資料聯網 (完全相容 iOS 9 Promise)
// ==========================================
function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    var ttnt = parseInt(trainObj.ttnt, 10);
    var timeDisplay = "";
    if (ttnt === 0) {
        timeDisplay = '<span class="status-flash">正在駛入</span>';
    } else if (ttnt === 1) {
        timeDisplay = '<span class="status-flash">即將抵達</span>';
    } else {
        timeDisplay = trainObj.time ? trainObj.time.substring(11, 16) : "--:--";
    }
    var rawDest = trainObj.dest;
    var destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;
    return { dest: destName, time: timeDisplay };
}

function renderMtrDirection(dataArray, elementId) {
    var container = document.getElementById(elementId);
    if (!container) return;
    
    var htmlString = "";
    for (var i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            var info = formatMtrTime(dataArray[i]);
            htmlString += '<div class="train-row" style="height:25%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + info.dest + '</div>' +
                '<div class="arrival-time time-mtr">' + info.time + '</div>' +
                '</div>';
        } else {
            var defaultDest = (i === 0) ? "班次已完結" : "--";
            htmlString += '<div class="train-row" style="height:25%;">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + defaultDest + '</div>' +
                '<div class="arrival-time time-mtr">--:--</div>' +
                '</div>';
        }
    }
    container.innerHTML = htmlString;
}

function loadMtrSchedule() {
    var url = 'https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=' + mtrLine + '&sta=' + mtrStation;
    
    fetch(url)
        .then(function(response) {
            return response.json();
        })
        .then(function(json) {
            if (!json || !json.data) return;
            var data = json.data[mtrLine + '-' + mtrStation];
            if (data) {
                renderMtrDirection(data.UP, "tuen-mun-list");       
                renderMtrDirection(data.DOWN, "wu-kai-sha-list");   
            }
        })
        .catch(function(error) {
            console.error("MTR API Error", error);
        });
}

loadMtrSchedule();
setInterval(loadMtrSchedule, 10000);
</script>

</body>
</html>
