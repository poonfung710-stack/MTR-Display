<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵乘客資訊顯示系統 (PIDS) - 天水圍站</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
    /* 核心修正：全域禁止 iOS 舊版 Safari 亂縮放字體 */
    -webkit-text-size-adjust: 100% !important;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 2vh 4vw; 
}

/* 頂部資訊列：iOS 12 完美顯示結構 */
.header-bar {
    height: 10vh; 
    border-bottom: 4px solid #947A4D; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 1vh;
    font-size: 5vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.4; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 1vh;
    font-size: 5vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.4; 
}

/* 班次顯示主要區域 */
.main-content {
    height: 82vh; 
    display: flex;
    flex-direction: column;
    justify-content: space-between; 
    margin: 1.5vh 0;
    box-sizing: border-box;
}

/* 每個方向的區塊 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.5vh 3vw; 
    height: 38vh; 
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    box-sizing: border-box;
}

.direction-title {
    font-size: 3.8vh;
    font-weight: bold;
    color: #FFCC00; 
    margin-bottom: 1vh;
    border-left: 8px solid #947A4D;
    padding-left: 15px;
    line-height: 1.2;
    height: 5vh; 
}

/* 列車班次列表 */
.train-list-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; 
    height: 30vh; 
}

.train-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 23%; 
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}

.train-row:last-child {
    border-bottom: none;
}

/* 班次序號 (1, 2, 3, 4) */
.seq {
    font-size: 3.2vh;
    color: #666666;
    width: 10%;
}

/* 目的地文字 */
.dest {
    font-size: 3.8vh;
    color: #FFFFFF;
    font-weight: bold;
    width: 50%;
}

/* 24小時制到達時間：終極鎖定，徹底破除 iOS 12 縮小 Bug */
.arrival-time {
    font-size: 4vh !important; /* 強制覆蓋所有動態縮放 */
    font-weight: bold;
    font-family: monospace;
    color: #00FF33;
    text-shadow: 0 0 10px rgba(0, 255, 51, 0.8);
    text-align: right;
    width: 40%;
    display: inline-block; /* 核心修改：改為塊級行內，防止高度被壓扁 */
    line-height: 1 !important; /* 固定行高為 1，不允許被四捨五入干擾 */
    -webkit-text-size-adjust: 100% !important; /* 核心修改：針對此欄位二次強制不縮放 */
}

/* 特殊狀態：正在駛入 / 即將抵達 改為紅色閃爍 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
    animation: blink 1s infinite;
    display: inline-block;
}

@keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.3; }
    100% { opacity: 1.0; }
}

/* 底部狀態列 */
.footer-bar {
    height: 4vh;
    line-height: 4vh;
    text-align: right;
    font-size: 1.8vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍</div>
    </div>

    <div class="main-content">
        
        <div class="direction-group">
            <div class="direction-title">往 屯門方向</div>
            <div class="train-list-container" id="tuen-mun-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

        <div class="direction-group">
            <div class="direction-title">往 烏溪沙方向</div>
            <div class="train-list-container" id="wu-kai-sha-list">
                <div class="train-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                <div class="train-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 運作中 | 強制繁體中文核心 | 自動更新: 10秒
    </div>

<script>
const line = "TML";
const station = "TIS";

const stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);
updateClock();

function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    
    const ttnt = parseInt(trainObj.ttnt, 10);
    let timeDisplay = "";
    
    if (ttnt === 0) {
        timeDisplay = `<span class="status-flash">正在駛入</span>`;
    } else if (ttnt === 1) {
        timeDisplay = `<span class="status-flash">即將抵達</span>`;
    } else {
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
        } else {
            timeDisplay = "--:--";
        }
    }

    const rawDest = trainObj.dest;
    const destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;

    return {
        dest: destName,
        time: timeDisplay
    };
}

function renderDirection(dataArray, elementId) {
    const container = document.getElementById(elementId);
    container.innerHTML = "";

    for (let i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            const info = formatMtrTime(dataArray[i]);
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${info.dest}</div>
                    <div class="arrival-time">${info.time}</div>
                </div>
            `;
        } else {
            container.innerHTML += `
                <div class="train-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${i === 0 ? "班次已完結" : "--"}</div>
                    <div class="arrival-time">--:--</div>
                </div>
            `;
        }
    }
}

async function loadSchedule() {
    try {
        const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${line}&sta=${station}`;
        const response = await fetch(url);
        const json = await response.json();
        const data = json.data[`${line}-${station}`];

        if (data) {
            renderDirection(data.UP, "tuen-mun-list");       
            renderDirection(data.DOWN, "wu-kai-sha-list");   
        }
    } catch (e) {
        console.error("MTR API Error:", e);
    }
}

loadSchedule();
setInterval(loadSchedule, 10000);
</script>

</body>
</html>
