<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合資訊顯示系統 (PIDS)</title>

<style>
/* 基礎重設：徹底鎖死視窗，防止任何滾動 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
    position: relative;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    box-sizing: border-box;
}

/* 頂部資訊列 */
.header-bar {
    position: absolute;
    top: 2%;
    left: 2%;
    right: 2%;
    height: 8%; 
    border-bottom: 4px solid #444444; 
    box-sizing: border-box;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 5px;
    font-size: 3.8vw; 
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 5px;
    font-size: 3.5vw; 
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要內容區域 */
.main-content {
    position: absolute;
    top: 12%;   
    bottom: 2%; 
    left: 2%;
    right: 2%;
    box-sizing: border-box;
}

/* 左右分欄 */
.left-col {
    position: absolute;
    left: 0;
    width: 48%;
    height: 100%;
}

.right-col {
    position: absolute;
    right: 0;
    width: 48%;
    height: 100%;
}

/* 所有面板絕對定位 */
.mtr-panel-1 {
    position: absolute;
    top: 0;
    height: 48.5%;
    width: 100%;
}

.mtr-panel-2 {
    position: absolute;
    bottom: 0;
    height: 48.5%;
    width: 100%;
}

.lrt-panel {
    position: absolute;
    top: 0;
    height: 61%; 
    width: 100%;
}

.bus-panel {
    position: absolute;
    bottom: 0;
    height: 36%; 
    width: 100%;
}

/* 容器群組基礎樣式 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    box-sizing: border-box;
    padding: 10px 15px;
}

.direction-title {
    font-size: 2.5vw; 
    font-weight: bold;
    margin-bottom: 5px;
    padding-left: 10px;
    line-height: 1.2;
}
.title-mtr { color: #B29A6F; border-left: 6px solid #947A4D; }
.title-lrt { color: #FF9900; border-left: 6px solid #FF9900; }
.title-bus { color: #FF3366; border-left: 6px solid #FF3366; } 

/* 列表容器 */
.train-list-container {
    position: absolute;
    top: 40px; 
    bottom: 10px;
    left: 15px;
    right: 15px;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
    -webkit-box-flex: 1;
    -webkit-flex: 1;
    flex: 1; 
}
.train-row:last-child {
    border-bottom: none;
}

/* 序號字體 */
.seq {
    font-size: 1.6vw; 
    color: #666666;
    width: 8%;
}

/* 港鐵欄位分配比例 */
.left-col .dest-mtr { 
    font-size: 2.4vw; 
    color: #FFFFFF; 
    font-weight: bold; 
    width: 35%; 
    white-space: nowrap; 
    overflow: hidden; 
}
.left-col .countdown-mtr { 
    font-size: 2.3vw; 
    font-weight: bold; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
    color: #FFCC00; 
    text-shadow: 0 0 10px rgba(255, 204, 0, 0.8); 
    text-align: left; 
    width: 41%; 
    padding-left: 1%;
    white-space: nowrap; 
}
.left-col .time-mtr { 
    font-size: 2.4vw; 
    font-weight: bold; 
    font-family: monospace; 
    text-align: right; 
    width: 16%; 
    color: #00FF33; 
    text-shadow: 0 0 10px rgba(0, 255, 51, 0.8); 
}

/* 右側輕鐵欄位字體 */
.lrt-no { font-size: 2.1vw; font-weight: bold; color: #FF9900; width: 14%; }
.dest-lrt { font-size: 2.1vw; color: #FFFFFF; font-weight: bold; white-space: nowrap; overflow: hidden; width: 36%; }
.mins-lrt { 
    font-size: 2.1vw; 
    font-weight: bold; 
    font-family: monospace; 
    color: #FFCC00; 
    text-shadow: 0 0 8px rgba(255, 204, 0, 0.8); 
    text-align: right; 
    width: 28%; 
}
.time-lrt { 
    font-size: 1.9vw; 
    font-family: monospace; 
    color: #888888; 
    text-align: right; 
    width: 14%; 
}

/* 巴士橫向排版字體與獨立欄位設定 */
.bus-route-no-medium {
    font-size: 2.2vw; 
    font-weight: bold;
    color: #FF3366;
    width: 18%;
    white-space: nowrap;
}
.bus-eta-wrapper-full {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    width: 74%;
}
.bus-time-inline-block {
    width: 33.33%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    align-items: center; 
    justify-content: space-between; /* 分開左右獨立欄位 */
    box-sizing: border-box;
    padding-left: 2px;
    padding-right: 6px;
}
.bus-mins-inline {
    font-size: 2.0vw; 
    font-weight: bold;
    font-family: monospace;
    color: #FF99CC;
    text-shadow: 0 0 6px rgba(255, 51, 102, 0.8);
    white-space: nowrap;
    text-align: left;
    flex: 1;
}
.bus-real-inline {
    font-size: 1.8vw; /* 放大但小於 2.0vw */
    color: #888888; 
    font-family: monospace;
    white-space: nowrap;
    text-align: right;
    margin-left: 4px;
}
.bus-empty-msg-large {
    font-size: 2.0vw; 
    color: #444444;
}

/* 紅色閃爍狀態 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}

@-webkit-keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
@keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天祐苑交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-panel-1">
                <div class="direction-title title-mtr">屯馬綫 往屯門方向</div>
                <div class="train-list-container" id="tuen-mun-list"></div>
            </div>

            <div class="direction-group mtr-panel-2">
                <div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div>
                <div class="train-list-container" id="wu-kai-sha-list"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group lrt-panel">
                <div class="direction-title title-lrt">輕鐵 天慈站</div>
                <div class="train-list-container" id="lrt-flat-list"></div>
            </div>

            <div class="direction-group bus-panel">
                <div class="direction-title title-bus">巴士 天祐苑站</div>
                <div class="train-list-container" id="bus-flat-list"></div>
            </div>
        </div>

    </div>

<script>
var mtrLine = "TML";
var mtrStation = "TIS";

var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

function padZero(num) {
    return num < 10 ? '0' + num : num;
}

var cachedLrtData = [];
var cachedBusData = { "276A": [], "B1": [], "A37": [], "B2P": [] };
var cachedMtrData = { UP: [], DOWN: [] }; 

// 用於新大嶼山巴士 (NLB) API 動態尋址
var nlbRouteId = null;
var nlbStopId = null;
var isNlbInitializing = false;

function updateClock() {
    var clockEl = document.getElementById('clock');
    if (!clockEl) return;
    var now = new Date();
    var hours = padZero(now.getHours());
    var minutes = padZero(now.getMinutes());
    var seconds = padZero(now.getSeconds());
    clockEl.innerText = hours + ':' + minutes + ':' + seconds;
}
setInterval(updateClock, 1000);
updateClock();

function getTargetTime24H(addMinutes) {
    var now = new Date();
    now.setMinutes(now.getMinutes() + addMinutes);
    return padZero(now.getHours()) + ":" + padZero(now.getMinutes());
}

function formatIsoTo24H(isoString) {
    if (!isoString) return "--:--";
    var date = new Date(isoString);
    if (isNaN(date.getTime())) return "--:--";
    return padZero(date.getHours()) + ":" + padZero(date.getMinutes());
}

// 港鐵處理
function formatMtrTime(trainObj, nowTime) {
    if (!trainObj) return null;
    var ttnt = parseInt(trainObj.ttnt, 10);
    var timeDisplay = "";
    var countdownText = ""; 

    if (ttnt === 0) {
        countdownText = '<span class="status-flash">正在駛入</span>';
        timeDisplay = ""; 
    } else if (ttnt === 1) {
        countdownText = '<span class="status-flash">即將抵達</span>';
        timeDisplay = ""; 
    } else {
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
            var trainTime = new Date(trainObj.time.replace(/-/g, "/")); 
            var diffMs = trainTime.getTime() - nowTime;
            var diffMins = Math.ceil(diffMs / 60000); 

            if (diffMins > 0) {
                countdownText = diffMins + ' 分鐘';
            } else {
                countdownText = '--';
            }
        } else {
            timeDisplay = "--:--";
            countdownText = "--";
        }
    }
    
    var rawDest = trainObj.dest;
    var destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;
    return { dest: destName, time: timeDisplay, countdown: countdownText };
}

function renderMtrDirection(dataArray, elementId, nowTime) {
    var container = document.getElementById(elementId);
    if (!container) return;
    
    var validTrains = [];
    if (dataArray && dataArray.length > 0) {
        for (var k = 0; k < dataArray.length; k++) {
            validTrains.push(dataArray[k]);
        }
    }

    var htmlString = "";
    for (var i = 0; i < 4; i++) {
        if (i < validTrains.length) {
            var info = formatMtrTime(validTrains[i], nowTime);
            htmlString += '<div class="train-row">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + info.dest + '</div>' +
                '<div class="countdown-mtr">' + info.countdown + '</div>' +
                '<div class="arrival-time time-mtr">' + info.time + '</div>' +
                '</div>';
        } else {
            var defaultMsg = (i === 0 && validTrains.length === 0) ? "資料更新中..." : "--";
            htmlString += '<div class="train-row">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="dest dest-mtr">' + defaultMsg + '</div>' +
                '<div class="countdown-mtr">--</div>' +
                '<div class="arrival-time time-mtr">--:--</div>' +
                '</div>';
        }
    }
    container.innerHTML = htmlString;
}

function renderRealMtrPIDS() {
    var nowTime = Date.now();
    renderMtrDirection(cachedMtrData.UP, "tuen-mun-list", nowTime);
    renderMtrDirection(cachedMtrData.DOWN, "wu-kai-sha-list", nowTime);
}

function loadMtrSchedule() {
    var url = 'https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=' + mtrLine + '&sta=' + mtrStation;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                if (!json || !json.data) {
                    return;
                }
                var data = json.data[mtrLine + '-' + mtrStation];
                if (data) {
                    cachedMtrData.UP = data.UP || [];
                    cachedMtrData.DOWN = data.DOWN || [];
                }
                renderRealMtrPIDS(); 
            } catch (e) {
                console.error("MTR API Parse Error", e);
            }
        }
    };
    xhr.send();
}

// 輕鐵處理
function renderRealLrtPIDS() {
    var listContainer = document.getElementById('lrt-flat-list');
    if (!listContainer) return;
    
    var nowTime = Date.now();
    var validTrains = [];
    
    if (cachedLrtData && cachedLrtData.length > 0) {
        for (var k = 0; k < cachedLrtData.length; k++) {
            validTrains.push(cachedLrtData[k]);
        }
    }

    var htmlString = '';
    var maxRows = 8; 

    for (var i = 0; i < maxRows; i++) {
        if (i < validTrains.length) {
            var train = validTrains[i];
            var etaDisplay = '';
            var realTime24H = '';

            if (train.eta === 0) {
                realTime24H = getTargetTime24H(0);
                if (train.rawTime && (train.rawTime.indexOf('離開') !== -1 || train.rawTime.toLowerCase().indexOf('departing') !== -1)) {
                    etaDisplay = '<span class="status-flash">離開中</span>';
                } else {
                    etaDisplay = '<span class="status-flash">到達</span>';
                }
            } else if (train.eta === 999) {
                etaDisplay = train.rawTime || '--';
                realTime24H = '--:--';
            } else {
                etaDisplay = train.eta + ' 分鐘';
                realTime24H = getTargetTime24H(train.eta);
            }

            var finalDest = "";
            if (train.route === '705') {
                finalDest = "往天水圍(北)";
            } else if (train.route === '706') {
                finalDest = "往天水圍(南)";
            } else if (train.dest && train.dest !== '--') {
                finalDest = "往" + train.dest;
            } else {
                finalDest = "--";
            }

            htmlString += '<div class="train-row">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="lrt-no">' + train.route + '</div>' +
                '<div class="dest dest-lrt">' + finalDest + '</div>' +
                '<div class="mins-lrt">' + etaDisplay + '</div>' +
                '<div class="time-lrt">' + realTime24H + '</div>' +
                '</div>';
        } else {
            var defaultMsg = (i === 0 && validTrains.length === 0) ? "資料更新中..." : "--";
            htmlString += '<div class="train-row">' +
                '<div class="seq">' + (i + 1) + '</div>' +
                '<div class="lrt-no">--</div>' +
                '<div class="dest dest-lrt">' + defaultMsg + '</div>' +
                '<div class="mins-lrt">--</div>' +
                '<div class="time-lrt">--:--</div>' +
                '</div>';
        }
    }
    listContainer.innerHTML = htmlString;
}

function loadLrtSchedule() {
    var url = 'https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=435&with_special=1';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                var combinedTrains = [];
                var nowTime = Date.now();
                
                if (json && json.platform_list && Array.isArray(json.platform_list)) {
                    for (var p = 0; p < json.platform_list.length; p++) {
                        var platform = json.platform_list[p];
                        if (platform.route_list && Array.isArray(platform.route_list)) {
                            for (var r = 0; r < platform.route_list.length; r++) {
                                var route = platform.route_list[r];
                                var timeStrEn = route.time_en || "";
                                var etaMin = 999;
                                var timeLower = timeStrEn.toLowerCase();
                                
                                if (timeLower.indexOf('arriving') !== -1 || timeLower.indexOf('departing') !== -1 || timeStrEn === '-') {
                                    etaMin = 0;
                                } else {
                                    var pTime = parseInt(timeStrEn, 10);
                                    if (!isNaN(pTime)) {
                                        etaMin = pTime;
                                    }
                                }
                                
                                combinedTrains.push({
                                    route: route.route_no || '--',
                                    dest: route.dest_ch || '--',
                                    eta: etaMin,
                                    rawTime: route.time_ch || route.time_en,
                                    absTimestamp: nowTime + (etaMin * 60000)
                                });
                            }
                        }
                    }
                }
                combinedTrains.sort(function(a, b) { return a.eta - b.eta; });
                cachedLrtData = combinedTrains;
                renderRealLrtPIDS(); 
            } catch (e) {
                console.error("輕鐵 API 解析錯誤:", e);
            }
        }
    };
    xhr.send();
}

// 巴士處理 (已將倒數分鐘與真實時間劃分為獨立欄位)
function generateBusRowHtml(seqNumber, routeName, rawEtas, nowTime) {
    var validEtas = [];
    if (rawEtas && rawEtas.length > 0) {
        for (var k = 0; k < rawEtas.length; k++) {
            validEtas.push(rawEtas[k]);
        }
    }

    var html = '<div class="train-row">'; 
    html += '<div class="seq">' + seqNumber + '</div>';
    html += '<div class="bus-route-no-medium">' + routeName + '</div>';
    html += '<div class="bus-eta-wrapper-full">';
    
    if (validEtas.length === 0) {
        html += '<div class="bus-empty-msg-large" style="width:100%; text-align:right;">資料更新中...</div>';
    } else {
        for (var b = 0; b < 3; b++) {
            if (b < validEtas.length) {
                var busItem = validEtas[b];
                var etaDate = new Date(busItem.eta);
                var diffMs = etaDate.getTime() - nowTime;
                var diffMins = Math.floor(diffMs / 60000);
                
                var minsText = diffMins <= 0 ? '<span class="status-flash">到達</span>' : diffMins + '分';
                var timeText = formatIsoTo24H(busItem.eta);
                
                html += '<div class="bus-time-inline-block">';
                html += '  <div class="bus-mins-inline">' + minsText + '</div>';
                html += '  <div class="bus-real-inline">' + timeText + '</div>';
                html += '</div>';
            } else {
                html += '<div class="bus-time-inline-block">';
                html += '  <div class="bus-mins-inline">--</div>';
                html += '  <div class="bus-real-inline">--:--</div>';
                html += '</div>';
            }
        }
    }
    html += '</div></div>';
    return html;
}

function renderRealBusPIDS() {
    var listContainer = document.getElementById('bus-flat-list');
    if (!listContainer) return;
    
    var nowTime = Date.now();
    var htmlString = '';
    
    htmlString += generateBusRowHtml(1, "276A", cachedBusData["276A"], nowTime);
    htmlString += generateBusRowHtml(2, "B1", cachedBusData["B1"], nowTime);
    htmlString += generateBusRowHtml(3, "A37", cachedBusData["A37"], nowTime);
    htmlString += generateBusRowHtml(4, "B2P", cachedBusData["B2P"], nowTime);

    listContainer.innerHTML = htmlString;
}

var busLoadedCount = 0;
function checkAndRenderBus() {
    busLoadedCount++;
    if (busLoadedCount >= 4) {
        renderRealBusPIDS(); 
        busLoadedCount = 0; 
    }
}

// 新大嶼山巴士 B2P 初始化尋址與抓取
function loadB2PSchedule() {
    if (nlbRouteId && nlbStopId) {
        fetchB2PEta();
    } else {
        if (!isNlbInitializing) {
            initNLBB2P();
        } else {
            checkAndRenderBus();
        }
    }
}

function initNLBB2P() {
    isNlbInitializing = true;
    var xhrRoute = new XMLHttpRequest();
    xhrRoute.open('GET', 'https://rt.data.gov.hk/v2/transport/nlb/route.php?action=list', true);
    xhrRoute.onreadystatechange = function() {
        if (xhrRoute.readyState === 4) {
            if (xhrRoute.status === 200) {
                try {
                    var json = JSON.parse(xhrRoute.responseText);
                    var targetRoute = null;
                    if (json && json.routes) {
                        for (var i = 0; i < json.routes.length; i++) {
                            if (json.routes[i].routeNo === 'B2P' && json.routes[i].routeName_c.indexOf('深圳灣') !== -1) {
                                targetRoute = json.routes[i];
                                break;
                            }
                        }
                    }
                    if (targetRoute) {
                        nlbRouteId = targetRoute.routeId;
                        var xhrStop = new XMLHttpRequest();
                        xhrStop.open('GET', 'https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=list&routeId=' + nlbRouteId, true);
                        xhrStop.onreadystatechange = function() {
                            if (xhrStop.readyState === 4) {
                                if (xhrStop.status === 200) {
                                    try {
                                        var stopJson = JSON.parse(xhrStop.responseText);
                                        if (stopJson && stopJson.stops) {
                                            for (var j = 0; j < stopJson.stops.length; j++) {
                                                if (stopJson.stops[j].stopName_c.indexOf('耀民') !== -1 || stopJson.stops[j].stopSequence == 8) {
                                                    nlbStopId = stopJson.stops[j].stopId;
                                                    break;
                                                }
                                            }
                                        }
                                    } catch (e) { console.error("NLB Stop Parse Error", e); }
                                }
                                isNlbInitializing = false;
                                if (nlbStopId) {
                                    fetchB2PEta();
                                } else {
                                    checkAndRenderBus();
                                }
                            }
                        };
                        xhrStop.send();
                    } else {
                        isNlbInitializing = false;
                        checkAndRenderBus();
                    }
                } catch (e) {
                    console.error("NLB Route Parse Error", e);
                    isNlbInitializing = false;
                    checkAndRenderBus();
                }
            } else {
                isNlbInitializing = false;
                checkAndRenderBus();
            }
        }
    };
    xhrRoute.send();
}

function fetchB2PEta() {
    var xhrEta = new XMLHttpRequest();
    var url = 'https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=estimatedArrivals&routeId=' + nlbRouteId + '&stopId=' + nlbStopId + '&language=zh';
    xhrEta.open('GET', url, true);
    xhrEta.onreadystatechange = function() {
        if (xhrEta.readyState === 4) {
            if (xhrEta.status === 200) {
                try {
                    var json = JSON.parse(xhrEta.responseText);
                    var etas = [];
                    if (json && json.estimatedArrivals) {
                        for (var i = 0; i < json.estimatedArrivals.length; i++) {
                            var safeTime = json.estimatedArrivals[i].estimatedArrivalTime.replace(/-/g, '/');
                            etas.push({ eta: safeTime });
                        }
                        etas.sort(function(a, b) { return new Date(a.eta) - new Date(b.eta); });
                    }
                    cachedBusData["B2P"] = etas.slice(0, 3);
                } catch (e) {
                    console.error("B2P API Parse Error:", e);
                }
            }
            checkAndRenderBus();
        }
    };
    xhrEta.send();
}
