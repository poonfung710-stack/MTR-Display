<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合資訊顯示系統 (PIDS)</title>

<style>
/* 基礎重設 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 1.5vh 2vw; 
}

/* 頂部資訊列 */
.header-bar {
    height: 8vh; 
    border-bottom: 4px solid #947A4D; 
    box-sizing: border-box;
    position: relative;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 0.8vh;
    font-size: 4.8vh;
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要分欄區域 */
.main-content {
    height: 88vh; 
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    margin: 1vh 0 0 0;
    box-sizing: border-box;
    gap: 2vw;
}

/* 左右對半分 50% */
.left-col, .right-col {
    width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
}

/* 區塊高度分配 */
.mtr-panel {
    height: 42.5vh;
    margin-bottom: 2vh;
}

/* 右側垂直分割：輕鐵 70%，巴士 30% */
.lrt-panel {
    height: 59vh;
    margin-bottom: 2vh;
}

.bus-panel {
    height: 26vh;
}

/* 容器群組 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 1.2vh 2vw; 
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    box-sizing: border-box;
}

.direction-title {
    font-size: 3.8vh; 
    font-weight: bold;
    margin-bottom: 0.6vh;
    padding-left: 15px;
    line-height: 1.2;
}
.title-mtr { color: #FFCC00; border-left: 8px solid #947A4D; }
.title-lrt { color: #FF9900; border-left: 8px solid #FF9900; }
.title-bus { color: #FF3366; border-left: 8px solid #FF3366; } /* 巴士使用鮮明紅粉色邊條 */

/* 列表容器 */
.train-list-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
}
.train-row:last-child {
    border-bottom: none;
}

.mtr-row { height: 7.2vh; }
.lrt-row { height: 8.4vh; }
.bus-row { height: 6.2vh; }

/* 欄位尺寸放大 */
.seq {
    font-size: 3.4vh;
    color: #666666;
    width: 8%;
}

.lrt-no, .bus-no {
    font-size: 4vh;
    font-weight: bold;
    width: 15%;
}
.lrt-no { color: #FF9900; }
.bus-no { color: #FF3366; }

.dest {
    font-size: 4.2vh;
    color: #FFFFFF;
    font-weight: bold;
    width: 47%;
    white-space: nowrap;
    overflow: hidden;
}

.arrival-time {
    font-size: 4.4vh;
    font-weight: bold;
    font-family: monospace;
    text-align: right;
    width: 30%;
}
.time-mtr { color: #00FF33; text-shadow: 0 0 12px rgba(0, 255, 51, 0.8); }
.time-lrt { color: #FFCC00; text-shadow: 0 0 12px rgba(255, 204, 0, 0.8); }
.time-bus { color: #FF99CC; text-shadow: 0 0 12px rgba(255, 51, 102, 0.8); }

/* 紅色閃爍狀態 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}

@-webkit-keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
@keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }

.footer-bar {
    height: 3vh;
    line-height: 3vh;
    text-align: right;
    font-size: 1.6vh;
    color: #444;
    box-sizing: border-box;
}
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天水圍交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-panel">
                <div class="direction-title title-mtr">屯馬綫 往屯門方向</div>
                <div class="train-list-container" id="tuen-mun-list">
                    <div class="train-row mtr-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row mtr-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row mtr-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row mtr-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>

            <div class="direction-group mtr-panel">
                <div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div>
                <div class="train-list-container" id="wu-kai-sha-list">
                    <div class="train-row mtr-row"><div class="seq">1</div><div class="dest">--</div><div class="arrival-time time-mtr">--:--</div></div>
                    <div class="train-row mtr-row"><div class="seq">2</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row mtr-row"><div class="seq">3</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                    <div class="train-row mtr-row"><div class="seq">4</div><div class="dest">--</div><div class="arrival-time">--:--</div></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group lrt-panel">
                <div class="direction-title title-lrt">輕鐵 天慈站 (下一班列車)</div>
                <div class="train-list-container" id="lrt-flat-list">
                    </div>
            </div>

            <div class="direction-group bus-panel">
                <div class="direction-title title-bus">九巴 276A 天祐苑站 (往上水)</div>
                <div class="train-list-container" id="bus-flat-list">
                    </div>
            </div>
        </div>

    </div>

    <div class="footer-bar">
        PIDS 三向智能資訊屏 | 地鐵實時直連 / 輕鐵巴士本地雙引擎 | 自動更新
    </div>

<script>
const mtrLine = "TML";
const mtrStation = "TIS";

const stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路",
    "YUL": "元朗", "LOP": "朗屏", "TWW": "荃灣西", "MEF": "美孚",
    "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德",
    "DIH": "鑽石山", "HIK": "顯徑", "TAW": "大圍", "CKT": "車公廟",
    "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

// 1. 時鐘同步
function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);
updateClock();

// ==========================================
// 右邊上方：輕鐵 天慈站 本地安全引擎 (調整為5班車)
// ==========================================
let lrtTrains = [
    { route: '706', dest: '天水圍循環線', eta: 1 },
    { route: '751', dest: '友愛', eta: 3 },
    { route: '705', dest: '天水圍循環線', eta: 6 },
    { route: '751', dest: '天逸', eta: 9 },
    { route: '706', dest: '天水圍循環線', eta: 13 }
];

function renderLrtPIDS() {
    const listContainer = document.getElementById('lrt-flat-list');
    listContainer.innerHTML = '';

    lrtTrains.sort((a, b) => a.eta - b.eta);

    lrtTrains.forEach((train, index) => {
        let etaDisplay = train.eta + ' 分鐘';
        if (train.eta <= 0) {
            etaDisplay = '<span class="status-flash">到達</span>';
        }

        listContainer.innerHTML += `
            <div class="train-row lrt-row">
                <div class="seq">${index + 1}</div>
                <div class="lrt-no">${train.route}</div>
                <div class="dest">往${train.dest}</div>
                <div class="arrival-time time-lrt">${etaDisplay}</div>
            </div>
        `;
    });
}

function simulateLrtCountdown() {
    lrtTrains.forEach((train) => {
        if (train.eta > 0) {
            train.eta -= 1;
        } else {
            train.eta = Math.floor(Math.random() * 6) + 10; 
        }
    });
    renderLrtPIDS();
}
setInterval(simulateLrtCountdown, 30000);
renderLrtPIDS();


// ==========================================
// 右邊下方：九巴 276A 天祐苑 本地安全引擎 (顯示3班車)
// ==========================================
let busTrains = [
    { route: '276A', dest: '上水', eta: 4 },
    { route: '276A', dest: '上水', eta: 12 },
    { route: '276A', dest: '上水', eta: 20 }
];

function renderBusPIDS() {
    const listContainer = document.getElementById('bus-flat-list');
    listContainer.innerHTML = '';

    busTrains.sort((a, b) => a.eta - b.eta);

    busTrains.forEach((bus, index) => {
        let etaDisplay = bus.eta + ' 分鐘';
        if (bus.eta <= 0) {
            etaDisplay = '<span class="status-flash">到站中</span>';
        }

        listContainer.innerHTML += `
            <div class="train-row bus-row">
                <div class="seq">${index + 1}</div>
                <div class="bus-no">${bus.route}</div>
                <div class="dest">往${bus.dest}</div>
                <div class="arrival-time time-bus">${etaDisplay}</div>
            </div>
        `;
    });
}

function simulateBusCountdown() {
    busTrains.forEach((bus) => {
        if (bus.eta > 0) {
            bus.eta -= 1;
        } else {
            bus.eta = Math.floor(Math.random() * 5) + 8; // 隨機生成 8-12 分鐘後的下班車
        }
    });
    renderBusPIDS();
}
setInterval(simulateBusCountdown, 30000);
renderBusPIDS();


// ==========================================
// 左邊：天水圍西鐵站 實時聯網核心
// ==========================================
function formatMtrTime(trainObj) {
    if (!trainObj) return null;
    const ttnt = parseInt(trainObj.ttnt, 10);
    let timeDisplay = "";
    if (ttnt === 0) {
        timeDisplay = `<span class="status-flash">正在駛入</span>`;
    } else if (ttnt === 1) {
        timeDisplay = `<span class="status-flash">即將抵達</span>`;
    } else {
        timeDisplay = trainObj.time ? trainObj.time.substring(11, 16) : "--:--";
    }
    const rawDest = trainObj.dest;
    const destName = stationNameMap[rawDest] || trainObj.dest_tch || rawDest;
    return { dest: destName, time: timeDisplay };
}

function renderMtrDirection(dataArray, elementId) {
    const container = document.getElementById(elementId);
    container.innerHTML = "";

    for (let i = 0; i < 4; i++) {
        if (dataArray && dataArray[i]) {
            const info = formatMtrTime(dataArray[i]);
            container.innerHTML += `
                <div class="train-row mtr-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${info.dest}</div>
                    <div class="arrival-time time-mtr">${info.time}</div>
                </div>
            `;
        } else {
            container.innerHTML += `
                <div class="train-row mtr-row">
                    <div class="seq">${i + 1}</div>
                    <div class="dest">${i === 0 ? "班次已完結" : "--"}</div>
                    <div class="arrival-time time-mtr">--:--</div>
                </div>
            `;
        }
    }
}

async function loadMtrSchedule() {
    try {
        const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${mtrLine}&sta=${mtrStation}`;
        const response = await fetch(url);
        const json = await response.json();
        const data = json.data[`${mtrLine}-${mtrStation}`];

        if (data) {
            renderMtrDirection(data.UP, "tuen-mun-list");       
            renderMtrDirection(data.DOWN, "wu-kai-sha-list");   
        }
    } catch (e) {
        console.error("MTR API Error");
    }
}

loadMtrSchedule();
setInterval(loadMtrSchedule, 10000);
</script>

</body>
</html>
