<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港鐵/輕鐵/巴士綜合資訊顯示系統 (PIDS)</title>

<style>
/* 基礎重設：徹底鎖死視窗，防止任何滾動 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: #000000;
    overflow: hidden;
    position: relative;
}

body {
    color: #00FF33; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    box-sizing: border-box;
}

/* 頂部資訊列 */
.header-bar {
    position: absolute;
    top: 2%;
    left: 2%;
    right: 2%;
    height: 8%; 
    border-bottom: 4px solid #444444; 
    box-sizing: border-box;
}

.real-time {
    position: absolute;
    left: 0;
    bottom: 5px;
    font-size: 3.8vw; 
    font-weight: bold;
    color: #00FF33;
    font-family: monospace; 
    text-shadow: 0 0 12px rgba(0, 255, 51, 0.7);
    line-height: 1.2; 
}

.station-title {
    position: absolute;
    right: 0;
    bottom: 5px;
    font-size: 3.5vw; 
    font-weight: bold;
    color: #FFFFFF; 
    line-height: 1.2; 
}

/* 主要內容區域 */
.main-content {
    position: absolute;
    top: 12%;   
    bottom: 2%; 
    left: 2%;
    right: 2%;
    box-sizing: border-box;
}

/* 左右分欄 */
.left-col {
    position: absolute;
    left: 0;
    width: 48%;
    height: 100%;
}

.right-col {
    position: absolute;
    right: 0;
    width: 48%;
    height: 100%;
}

/* 所有面板絕對定位 */
.mtr-panel-1 {
    position: absolute;
    top: 0;
    height: 48.5%;
    width: 100%;
}

.mtr-panel-2 {
    position: absolute;
    bottom: 0;
    height: 48.5%;
    width: 100%;
}

.lrt-panel {
    position: absolute;
    top: 0;
    height: 61%; 
    width: 100%;
}

.bus-panel {
    position: absolute;
    bottom: 0;
    height: 36%; 
    width: 100%;
}

/* 容器群組基礎樣式 */
.direction-group {
    background: #050505;
    border: 2px solid #111;
    border-radius: 12px;
    box-sizing: border-box;
    padding: 10px 15px;
}

.direction-title {
    font-size: 2.5vw; 
    font-weight: bold;
    margin-bottom: 5px;
    padding-left: 10px;
    line-height: 1.2;
}
.title-mtr { color: #B29A6F; border-left: 6px solid #947A4D; }
.title-lrt { color: #FF9900; border-left: 6px solid #FF9900; }
.title-bus { color: #FF3366; border-left: 6px solid #FF3366; } 

/* 列表容器 */
.train-list-container {
    position: absolute;
    top: 40px; 
    bottom: 10px;
    left: 15px;
    right: 15px;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    justify-content: space-between;
}

.train-row {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -webkit-flex-direction: row;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #222;
    box-sizing: border-box;
    -webkit-box-flex: 1;
    -webkit-flex: 1;
    flex: 1; 
}
.train-row:last-child {
    border-bottom: none;
}

/* 序號字體 */
.seq { font-size: 1.6vw; color: #666666; width: 8%; }

/* 港鐵欄位分配比例 */
.left-col .dest-mtr { font-size: 2.4vw; color: #FFFFFF; font-weight: bold; width: 35%; white-space: nowrap; overflow: hidden; }
.left-col .countdown-mtr { font-size: 2.3vw; font-weight: bold; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #FFCC00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.8); text-align: left; width: 41%; padding-left: 1%; white-space: nowrap; }
.left-col .time-mtr { font-size: 2.4vw; font-weight: bold; font-family: monospace; text-align: right; width: 16%; color: #00FF33; text-shadow: 0 0 10px rgba(0, 255, 51, 0.8); }

/* 右側輕鐵欄位字體 */
.lrt-no { font-size: 2.1vw; font-weight: bold; color: #FF9900; width: 14%; }
.dest-lrt { font-size: 2.1vw; color: #FFFFFF; font-weight: bold; white-space: nowrap; overflow: hidden; width: 36%; }
.mins-lrt { font-size: 2.1vw; font-weight: bold; font-family: monospace; color: #FFCC00; text-shadow: 0 0 8px rgba(255, 204, 0, 0.8); text-align: right; width: 28%; }
.time-lrt { font-size: 1.9vw; font-family: monospace; color: #888888; text-align: right; width: 14%; }

/* 巴士橫向排版字體 */
.bus-route-no-medium { font-size: 2.2vw; font-weight: bold; color: #FF3366; width: 18%; white-space: nowrap; }
.bus-eta-wrapper-full { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: horizontal; -webkit-box-direction: normal; -webkit-flex-direction: row; flex-direction: row; justify-content: space-between; width: 74%; }
.bus-time-inline-block { width: 33.33%; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: horizontal; -webkit-box-direction: normal; -webkit-flex-direction: row; flex-direction: row; align-items: center; justify-content: flex-end; box-sizing: border-box; padding-right: 4px; }
.bus-mins-inline { font-size: 2.0vw; font-weight: bold; font-family: monospace; color: #FF99CC; text-shadow: 0 0 6px rgba(255, 51, 102, 0.8); white-space: nowrap; }
.bus-real-inline { font-size: 1.5vw; color: #888888; font-family: monospace; margin-left: 4px; white-space: nowrap; }
.bus-empty-msg-large { font-size: 2.0vw; color: #444444; }

/* 紅色閃爍狀態 */
.status-flash {
    color: #FF3333; 
    text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    -webkit-animation: blink 1s infinite;
    animation: blink 1s infinite;
}

@-webkit-keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
@keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
</style>
</head>

<body>

    <div class="header-bar">
        <div class="real-time" id="clock">00:00:00</div>
        <div class="station-title">天祐苑交通綜合資訊屏</div>
    </div>

    <div class="main-content">
        
        <div class="left-col">
            <div class="direction-group mtr-panel-1">
                <div class="direction-title title-mtr">屯馬綫 往屯門方向</div>
                <div class="train-list-container" id="tuen-mun-list"></div>
            </div>

            <div class="direction-group mtr-panel-2">
                <div class="direction-title title-mtr">屯馬綫 往烏溪沙方向</div>
                <div class="train-list-container" id="wu-kai-sha-list"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="direction-group lrt-panel">
                <div class="direction-title title-lrt">輕鐵 天慈站</div>
                <div class="train-list-container" id="lrt-flat-list"></div>
            </div>

            <div class="direction-group bus-panel">
                <div class="direction-title title-bus">巴士 天耀邨耀民樓</div>
                <div class="train-list-container" id="bus-flat-list"></div>
            </div>
        </div>

    </div>

<script>
// --- 時間及共用函數 ---
function padZero(num) { return num < 10 ? '0' + num : num; }
function getTargetTime24H(addMinutes) {
    var now = new Date();
    now.setMinutes(now.getMinutes() + addMinutes);
    return padZero(now.getHours()) + ":" + padZero(now.getMinutes());
}
function formatIsoTo24H(isoString) {
    if (!isoString) return "--:--";
    var date = new Date(isoString);
    if (isNaN(date.getTime())) return "--:--";
    return padZero(date.getHours()) + ":" + padZero(date.getMinutes());
}

function updateClock() {
    var clockEl = document.getElementById('clock');
    if (!clockEl) return;
    var now = new Date();
    clockEl.innerText = padZero(now.getHours()) + ':' + padZero(now.getMinutes()) + ':' + padZero(now.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

// --- 資料快取區 ---
var cachedMtrData = { UP: [], DOWN: [] }; 
var cachedLrtData = [];
var cachedBusData = { "276A": [], "B1": [], "A37": [], "B2P": [] };

var mtrLine = "TML";
var mtrStation = "TIS";
var stationNameMap = {
    "TUM": "屯門", "SIH": "兆康", "TIS": "天水圍", "KSR": "錦上路", "YUL": "元朗", "LOP": "朗屏", 
    "TWW": "荃灣西", "MEF": "美孚", "NAC": "南昌", "AUS": "柯士甸", "ETS": "尖東", "HUH": "紅磡",
    "HOM": "何文田", "TKW": "土瓜灣", "SUW": "宋皇臺", "CKH": "啟德", "DIH": "鑽石山", "HIK": "顯徑", 
    "TAW": "大圍", "CKT": "車公廟", "STW": "沙田圍", "CIO": "第一城", "SHM": "石門", "TSH": "大水坑",
    "HEO": "恆安", "MOS": "馬鞍山", "WKS": "烏溪沙"
};

// ==========================================
// 1. 港鐵 (MTR) 處理區
// ==========================================
function formatMtrTime(trainObj, nowTime) {
    if (!trainObj) return null;
    var ttnt = parseInt(trainObj.ttnt, 10);
    var timeDisplay = "";
    var countdownText = ""; 

    if (ttnt === 0) { countdownText = '<span class="status-flash">正在駛入</span>'; } 
    else if (ttnt === 1) { countdownText = '<span class="status-flash">即將抵達</span>'; } 
    else {
        if (trainObj.time) {
            timeDisplay = trainObj.time.substring(11, 16); 
            var trainTime = new Date(trainObj.time.replace(/-/g, "/")); 
            var diffMins = Math.ceil((trainTime.getTime() - nowTime) / 60000); 
            countdownText = (diffMins > 0) ? diffMins + ' 分鐘' : '--';
        } else {
            timeDisplay = "--:--";
            countdownText = "--";
        }
    }
    var destName = stationNameMap[trainObj.dest] || trainObj.dest_tch || trainObj.dest;
    return { dest: destName, time: timeDisplay, countdown: countdownText };
}

function renderMtrDirection(dataArray, elementId, nowTime) {
    var container = document.getElementById(elementId);
    if (!container) return;
    
    var htmlString = "";
    for (var i = 0; i < 4; i++) {
        if (dataArray && i < dataArray.length) {
            var info = formatMtrTime(dataArray[i], nowTime);
            htmlString += '<div class="train-row"><div class="seq">' + (i + 1) + '</div><div class="dest dest-mtr">' + info.dest + '</div><div class="countdown-mtr">' + info.countdown + '</div><div class="arrival-time time-mtr">' + info.time + '</div></div>';
        } else {
            var defaultMsg = (i === 0 && (!dataArray || dataArray.length === 0)) ? "資料更新中..." : "--";
            htmlString += '<div class="train-row"><div class="seq">' + (i + 1) + '</div><div class="dest dest-mtr">' + defaultMsg + '</div><div class="countdown-mtr">--</div><div class="arrival-time time-mtr">--:--</div></div>';
        }
    }
    container.innerHTML = htmlString;
}

function loadMtrSchedule() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=' + mtrLine + '&sta=' + mtrStation, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                if (json && json.data && json.data[mtrLine + '-' + mtrStation]) {
                    cachedMtrData.UP = json.data[mtrLine + '-' + mtrStation].UP || [];
                    cachedMtrData.DOWN = json.data[mtrLine + '-' + mtrStation].DOWN || [];
                }
                var nowTime = Date.now();
                renderMtrDirection(cachedMtrData.UP, "tuen-mun-list", nowTime);
                renderMtrDirection(cachedMtrData.DOWN, "wu-kai-sha-list", nowTime);
            } catch (e) { console.error("MTR API 解析錯誤", e); }
        }
    };
    xhr.send();
}

// ==========================================
// 2. 輕鐵 (LRT) 處理區
// ==========================================
function renderRealLrtPIDS() {
    var listContainer = document.getElementById('lrt-flat-list');
    if (!listContainer) return;
    
    var htmlString = '';
    for (var i = 0; i < 8; i++) {
        if (cachedLrtData && i < cachedLrtData.length) {
            var train = cachedLrtData[i];
            var etaDisplay = '', realTime24H = '';

            if (train.eta === 0) {
                realTime24H = getTargetTime24H(0);
                etaDisplay = (train.rawTime && (train.rawTime.indexOf('離開') !== -1 || train.rawTime.toLowerCase().indexOf('departing') !== -1)) 
                            ? '<span class="status-flash">離開中</span>' 
                            : '<span class="status-flash">到達</span>';
            } else if (train.eta === 999) {
                etaDisplay = train.rawTime || '--'; realTime24H = '--:--';
            } else {
                etaDisplay = train.eta + ' 分鐘'; realTime24H = getTargetTime24H(train.eta);
            }

            var finalDest = (train.route === '705') ? "往天水圍(北)" : (train.route === '706') ? "往天水圍(南)" : (train.dest && train.dest !== '--') ? "往" + train.dest : "--";
            htmlString += '<div class="train-row"><div class="seq">' + (i + 1) + '</div><div class="lrt-no">' + train.route + '</div><div class="dest dest-lrt">' + finalDest + '</div><div class="mins-lrt">' + etaDisplay + '</div><div class="time-lrt">' + realTime24H + '</div></div>';
        } else {
            var defaultMsg = (i === 0 && (!cachedLrtData || cachedLrtData.length === 0)) ? "資料更新中..." : "--";
            htmlString += '<div class="train-row"><div class="seq">' + (i + 1) + '</div><div class="lrt-no">--</div><div class="dest dest-lrt">' + defaultMsg + '</div><div class="mins-lrt">--</div><div class="time-lrt">--:--</div></div>';
        }
    }
    listContainer.innerHTML = htmlString;
}

function loadLrtSchedule() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=435&with_special=1', true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var json = JSON.parse(xhr.responseText);
                var combinedTrains = [];
                if (json && json.platform_list) {
                    for (var p = 0; p < json.platform_list.length; p++) {
                        var routes = json.platform_list[p].route_list || [];
                        for (var r = 0; r < routes.length; r++) {
                            var route = routes[r];
                            var timeStrEn = route.time_en || "";
                            var etaMin = 999;
                            if (timeStrEn.toLowerCase().indexOf('arriving') !== -1 || timeStrEn.toLowerCase().indexOf('departing') !== -1 || timeStrEn === '-') {
                                etaMin = 0;
                            } else {
                                var pTime = parseInt(timeStrEn, 10);
                                if (!isNaN(pTime)) etaMin = pTime;
                            }
                            combinedTrains.push({ route: route.route_no || '--', dest: route.dest_ch || '--', eta: etaMin, rawTime: route.time_ch || route.time_en });
                        }
                    }
                }
                combinedTrains.sort(function(a, b) { return a.eta - b.eta; });
                cachedLrtData = combinedTrains;
                renderRealLrtPIDS(); 
            } catch (e) { console.error("輕鐵 API 解析錯誤:", e); }
        }
    };
    xhr.send();
}

// ==========================================
// 3. 巴士 (Bus) 處理區
// ==========================================
function generateBusRowHtml(seqNumber, routeName, rawEtas, nowTime) {
    var html = '<div class="train-row"><div class="seq">' + seqNumber + '</div><div class="bus-route-no-medium">' + routeName + '</div><div class="bus-eta-wrapper-full">';
    if (!rawEtas || rawEtas.length === 0) {
        html += '<div class="bus-empty-msg-large" style="width:100%; text-align:right;">資料更新中...</div>';
    } else {
        for (var b = 0; b < 3; b++) {
            if (b < rawEtas.length) {
                var diffMins = Math.floor((new Date(rawEtas[b].eta).getTime() - nowTime) / 60000);
                var minsText = diffMins <= 0 ? '<span class="status-flash">到達</span>' : diffMins + '分';
                var timeText = formatIsoTo24H(rawEtas[b].eta);
                html += '<div class="bus-time-inline-block"><span class="bus-mins-inline">' + minsText + '</span><span class="bus-real-inline">' + timeText + '</span></div>';
            } else {
                html += '<div class="bus-time-inline-block"><span class="bus-mins-inline">--</span><span class="bus-real-inline">--:--</span></div>';
            }
        }
    }
    html += '</div></div>';
    return html;
}

function renderRealBusPIDS() {
    var listContainer = document.getElementById('bus-flat-list');
    if (!listContainer) return;
    var nowTime = Date.now();
    var htmlString = '';
    htmlString += generateBusRowHtml(1, "276A", cachedBusData["276A"], nowTime);
    htmlString += generateBusRowHtml(2, "B1", cachedBusData["B1"], nowTime);
    htmlString += generateBusRowHtml(3, "A37", cachedBusData["A37"], nowTime);
    htmlString += generateBusRowHtml(4, "B2P", cachedBusData["B2P"], nowTime);
    listContainer.innerHTML = htmlString;
}

// === 九巴 API 擷取 ===
function fetchKMB(route, dir, seqForStopLookup, finalStopSeq) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/' + route + '/1', true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var json = JSON.parse(xhr.responseText);
                    if (json && json.data) {
                        var etas = [];
                        var targetStopId = "";
                        
                        // 動態找出該站的 Stop ID
                        for (var i = 0; i < json.data.length; i++) {
                            if (json.data[i].dir === dir && json.data[i].seq == seqForStopLookup) {
                                targetStopId = json.data[i].stop;
                                break;
                            }
                        }

                        // 過濾出 ETA
                        var seenTimes = {};
                        for (var i = 0; i < json.data.length; i++) {
                            var item = json.data[i];
                            var isCancelled = item.rmk_tc && item.rmk_tc.indexOf('取消') !== -1;
                            if (item.eta && !isCancelled) {
                                if ((targetStopId && item.stop === targetStopId) || (!targetStopId && item.dir === dir && item.seq == finalStopSeq)) {
                                    var tString = formatIsoTo24H(item.eta);
                                    if (!seenTimes[tString]) {
                                        seenTimes[tString] = true;
                                        etas.push(item);
                                    }
                                }
                            }
                        }
                        etas.sort(function(a, b) { return new Date(a.eta) - new Date(b.eta); });
                        cachedBusData[route] = etas.slice(0, 3);
                    }
                } catch (e) { console.error("[KMB Debug] " + route + " 解析錯誤:", e); }
            }
            // 不管成功與否，立刻渲染，不互相阻擋
            renderRealBusPIDS();
        }
    };
    xhr.send();
}

// === 嶼巴 B2P 專用邏輯 (帶有嚴格比對機制) ===
var nlbB2P_RouteId = null;
var nlbB2P_StopId = null;
var nlbInitializing = false;

function fetchNLB_B2P() {
    if (nlbB2P_RouteId && nlbB2P_StopId) {
        // 如果已經鎖定，直接拿 ETA
        var xhrEta = new XMLHttpRequest();
        xhrEta.open('GET', 'https://rt.data.gov.hk/v2/transport/nlb/eta.php?action=eta&routeId=' + nlbB2P_RouteId + '&stopId=' + nlbB2P_StopId, true);
        xhrEta.onreadystatechange = function() {
            if (xhrEta.readyState === 4) {
                if (xhrEta.status === 200) {
                    try {
                        var json = JSON.parse(xhrEta.responseText);
                        console.log("[NLB Debug] ETA API 回傳資料:", json);
                        var etas = [];
                        if (json && json.estimatedArrivals) {
                            for (var i = 0; i < json.estimatedArrivals.length; i++) {
                                var timeStr = json.estimatedArrivals[i].estimatedArrivalTime;
                                if (timeStr) {
                                    // 確保 Safari 正確轉換為 Date: "YYYY-MM-DD HH:mm:ss" -> "YYYY-MM-DDTHH:mm:ss+08:00"
                                    var isoFormatted = timeStr.replace(' ', 'T') + '+08:00';
                                    etas.push({ eta: isoFormatted });
                                }
                            }
                        }
                        etas.sort(function(a, b) { return new Date(a.eta) - new Date(b.eta); });
                        cachedBusData["B2P"] = etas.slice(0, 3);
                    } catch (e) { console.error("[NLB Debug] ETA 解析錯誤:", e); }
                } else {
                    console.error("[NLB Debug] ETA API 請求失敗，狀態碼:", xhrEta.status);
                }
                renderRealBusPIDS(); 
            }
        };
        xhrEta.send();
    } else {
        // 全面掃描路線
        if (nlbInitializing) return;
        nlbInitializing = true;
        console.log("[NLB Debug] 開始全網掃描 B2P 路線...");
        
        var xhrRoute = new XMLHttpRequest();
        xhrRoute.open('GET', 'https://rt.data.gov.hk/v2/transport/nlb/route.php?action=list', true);
        xhrRoute.onreadystatechange = function() {
            if (xhrRoute.readyState === 4) {
                if (xhrRoute.status === 200) {
                    try {
                        var json = JSON.parse(xhrRoute.responseText);
                        var candidateRoutes = [];
                        for (var i = 0; i < json.routes.length; i++) {
                            if (json.routes[i].routeNo === 'B2P') {
                                candidateRoutes.push(json.routes[i].routeId);
                                console.log("[NLB Debug] 找到候選 B2P RouteId:", json.routes[i].routeId, "名稱:", json.routes[i].routeName_c);
                            }
                        }
                        if (candidateRoutes.length > 0) {
                            searchNLBStopRecursively(candidateRoutes, 0);
                        } else {
                            console.error("[NLB Debug] Route API 找不到任何 B2P 路線");
                            nlbInitializing = false;
                        }
                    } catch (e) { 
                        console.error("[NLB Debug] Route 解析錯誤:", e); 
                        nlbInitializing = false; 
                    }
                } else {
                    nlbInitializing = false;
                }
            }
        };
        xhrRoute.send();
    }
}

function searchNLBStopRecursively(routeIds, index) {
    if (index >= routeIds.length) {
        console.error("[NLB Debug] 已檢查所有 B2P 路線，但找不到包含「耀民」且往深圳灣方向的車站！");
        nlbInitializing = false;
        renderRealBusPIDS();
        return;
    }
    var rid = routeIds[index];
    console.log("[NLB Debug] 正在檢查 RouteId: " + rid + " 的車站列表...");
    
    var xhrStop = new XMLHttpRequest();
    xhrStop.open('GET', 'https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=list&routeId=' + rid, true);
    xhrStop.onreadystatechange = function() {
        if (xhrStop.readyState === 4) {
            if (xhrStop.status === 200) {
                try {
                    var json = JSON.parse(xhrStop.responseText);
                    var stops = json.stops || [];
                    if (stops.length > 0) {
                        // 檢查該路線終點站是否往深圳灣
                        var lastStopName = stops[stops.length - 1].stopName_c;
                        var isToShenzhenBay = (lastStopName.indexOf('深圳灣') !== -1 || lastStopName.indexOf('Shenzhen Bay') !== -1);
                        console.log("[NLB Debug] RouteId " + rid + " 終點站為: " + lastStopName + " (是否往深圳灣: " + isToShenzhenBay + ")");

                        if (isToShenzhenBay) {
                            // 若方向正確，在裡面精確尋找「耀民」
                            for (var i = 0; i < stops.length; i++) {
                                if (stops[i].stopName_c.indexOf('耀民') !== -1) {
                                    nlbB2P_RouteId = rid;
                                    nlbB2P_StopId = stops[i].stopId;
                                    console.log("[NLB Debug] ✅ 成功鎖定官方車站！RouteId:", nlbB2P_RouteId, "StopId:", nlbB2P_StopId, "站名:", stops[i].stopName_c, "站序:", (i+1));
                                    nlbInitializing = false;
                                    fetchNLB_B2P(); // 立即獲取 ETA
                                    return; // 找到即終止遞迴
                                }
                            }
                        }
                    }
                } catch (e) { console.error("[NLB Debug] Stop API 解析錯誤:", e); }
            }
            // 若此 routeId 找不到，則檢查下一個
            searchNLBStopRecursively(routeIds, index + 1);
        }
    };
    xhrStop.send();
}

function loadAllBusSchedules() {
    // 獨立派發每個請求，各自更新畫面
    fetchKMB("276A", "O", 9, 9);
    fetchKMB("B1", "O", 4, 4);
    fetchKMB("A37", "O", 14, 14);
    fetchNLB_B2P();
}

// ==========================================
// 4. 定時器初始化
// ==========================================
loadMtrSchedule();
loadLrtSchedule();
loadAllBusSchedules();

setInterval(loadMtrSchedule, 10000);
setInterval(loadLrtSchedule, 10000);
setInterval(loadAllBusSchedules, 10000);

</script>
