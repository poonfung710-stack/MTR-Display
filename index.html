<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴276A｜天祐苑站 實時到站顯示屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "Noto Sans TC", monospace;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* 巴士電子屏外框 */
        .bus-screen {
            background: #0a0a0a;
            border: 12px solid #222;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 0 40px #ffcc0040;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .route-title {
            color: #ffcc00;
            font-size: 36px;
            font-weight: bold;
        }
        .station-name {
            color: #fff;
            font-size: 22px;
            margin-top: 6px;
        }
        .direction-switch {
            background: #222;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            padding: 8px 16px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 6px;
        }
        .direction-switch:hover {
            background: #ffcc00;
            color: #000;
        }
        /* 到站列表 三班車 */
        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .eta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 16px;
            border: 1px solid #ffcc0060;
            border-radius: 10px;
        }
        .eta-number {
            color: #ffcc00;
            font-size: 42px;
            width: 60px;
        }
        .eta-dest {
            flex: 1;
            color: #fff;
            font-size: 24px;
            margin-left: 20px;
        }
        .eta-time {
            color: #ffcc00;
            font-size: 46px;
            font-weight: bold;
        }
        .loading-text {
            color: #ffcc00;
            text-align: center;
            font-size: 26px;
            padding: 60px 0;
        }
        .empty-text {
            color: #ff6666;
            text-align: center;
            font-size: 24px;
            padding: 60px 0;
        }
        .footer {
            margin-top: 30px;
            padding-top: 16px;
            border-top: 1px solid #ffcc0040;
            color: #aaa;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="bus-screen">
        <div class="header">
            <div>
                <div class="route-title">九巴 276A</div>
                <div class="station-name">天祐苑 Tin Yau Court</div>
            </div>
            <button class="direction-switch" id="switchBtn">切換方向</button>
        </div>

        <div class="eta-list" id="etaContainer">
            <div class="loading-text">正在載入實時到站數據…</div>
        </div>

        <div class="footer">
            <span>數據來源：香港運輸署開放數據</span>
            <span>自動每30秒更新｜最多顯示3班車</span>
        </div>
    </div>

    <script>
        // 天祐苑站 stop ID
        const STOP_ID = "002148";
        // 兩個行車方向：
        // 1: 天恆邨 → 太平 (往上水太平)
        // 2: 太平 → 天恆邨 (往天水圍天恆邨)
        let currentDirection = 1;
        const destName = {
            1: "太平 Tai Ping",
            2: "天恆邨 Tin Heng Estate"
        };

        const etaContainer = document.getElementById("etaContainer");
        const switchBtn = document.getElementById("switchBtn");

        // 切換方向按鈕
        switchBtn.addEventListener("click", () => {
            currentDirection = currentDirection === 1 ? 2 : 1;
            loadBusETA();
        });

        // 載入實時ETA
        async function loadBusETA() {
            etaContainer.innerHTML = `<div class="loading-text">載入${destName[currentDirection]}方向數據…</div>`;
            try {
                // 官方API：取得該站+路線的預計到站
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${STOP_ID}/276A/1`);
                const data = await res.json();
                // 過濾對應方向班次
                const targetEta = data.data.filter(item => item.dir == currentDirection);

                if (targetEta.length === 0) {
                    etaContainer.innerHTML = `<div class="empty-text">暫無即將到站班次</div>`;
                    return;
                }
                // 只取頭3班
                const top3 = targetEta.slice(0, 3);
                let html = "";
                top3.forEach((bus, idx) => {
                    const minute = bus.eta_min;
                    html += `
                    <div class="eta-item">
                        <div class="eta-number">${idx+1}</div>
                        <div class="eta-dest">往 ${destName[currentDirection]}</div>
                        <div class="eta-time">${minute} 分鐘</div>
                    </div>
                    `;
                });
                etaContainer.innerHTML = html;
            } catch (err) {
                etaContainer.innerHTML = `<div class="empty-text">數據載入失敗，請稍後重試</div>`;
                console.error("API錯誤：", err);
            }
        }

        // 開頁立即執行 + 每30秒自動刷新
        loadBusETA();
        setInterval(loadBusETA, 30000);
    </script>
</body>
</html>
